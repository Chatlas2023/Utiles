<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Utilidades Compactas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 10px; /* Reducido para ganar espacio */
        }
        
        .container {
            max-width: 600px; /* Limitamos el ancho para mantener todo junto */
            margin: 0 auto;
        }
        
        header { text-align: center; margin-bottom: 15px; }
        h1 { color: #bb86fc; font-size: 22px; }
        .subtitle { color: #a0a0a0; font-size: 14px; }
        
        .games-grid {
            display: grid;
            /* Forzamos 3 columnas en móviles pequeños, 4 en medianos */
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            justify-items: center;
        }
        
        .game-icon {
            background-color: #1e1e1e;
            border-radius: 12px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: inherit;
            width: 100%; /* Se adapta a la columna */
            max-width: 100px;
            height: 110px;
            border: 1px solid #333;
            padding: 10px;
            transition: transform 0.2s;
            position: relative;
        }
        
        .game-icon:active { transform: scale(0.95); }
        
        .game-symbol {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            font-size: 24px;
            background-color: #2a2a2a;
            overflow: hidden;
        }

        /* DISEÑO FLOW FREE */
        .flow-icon { width: 100%; height: 100%; position: relative; background: #000; }
        .flow-dot { width: 10px; height: 10px; border-radius: 50%; position: absolute; z-index: 2; }
        .dot-blue { background: #3A86FF; top: 15%; left: 15%; }
        .dot-blue-2 { background: #3A86FF; bottom: 15%; right: 15%; }
        .flow-line {
            position: absolute;
            border: 4px solid #3A86FF;
            width: 55%; height: 55%;
            border-bottom: none; border-left: none;
            border-radius: 0 15px 0 0;
            top: 25%; left: 20%; z-index: 1;
        }
        
        .game-name {
            font-size: 11px;
            color: #bb86fc;
            font-weight: 500;
            line-height: 1.2;
            text-align: center;
        }
        
        .badge-new {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #03dac6;
            color: #000;
            font-size: 8px;
            font-weight: bold;
            border-radius: 10px;
            padding: 2px 5px;
            z-index: 10;
        }

        @media (min-width: 450px) {
            .games-grid { grid-template-columns: repeat(4, 1fr); }
        }
        
        footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Utilidades</h1>
            <p class="subtitle">Todo en una pantalla</p>
        </header>
        
        <div class="games-grid">
            <a href="Contador.html" class="game-icon">
                <div class="game-symbol">🔢</div>
                <div class="game-name">Contador</div>
            </a>
            <a href="Mapa.html" class="game-icon">
                <div class="game-symbol">🗺️</div>
                <div class="game-name">Mapa</div>
            </a>
            <a href="Dic_arg_esp.html" class="game-icon">
                <div class="game-symbol">🇦🇷</div>
                <div class="game-name">Diccionario</div>
            </a>
            <a href="Sumayresta.html" class="game-icon">
                <div class="game-symbol">➕➖</div>
                <div class="game-name">Suma</div>
            </a>
            <a href="arboles.html" class="game-icon">
                <div class="game-symbol">🌳</div>
                <div class="game-name">Árboles</div>
            </a>
            <a href="quiz.html" class="game-icon">
                <div class="game-symbol">🤔</div>
                <div class="game-name">Trivia</div>
            </a>
            <a href="Rebote.html" class="game-icon">
                <div class="game-symbol">⚪</div>
                <div class="game-name">Rebote</div>
            </a>
            <a href="https://chatlas2026-padron-premium.hf.space/" target="_blank" class="game-icon">
                <div class="game-symbol">🗳️</div>
                <div class="game-name">Padrón</div>
            </a>
            <a href="Circuitos.html" class="game-icon">
                <div class="badge-new">NUEVO</div>
                <div class="game-symbol">
                    <div class="flow-icon">
                        <div class="flow-dot dot-blue"></div>
                        <div class="flow-line"></div>
                        <div class="flow-dot dot-blue-2"></div>
                    </div>
                </div>
                <div class="game-name">Circuitos</div>
            </a>
        </div>
        
        <footer>
            <p>© 2026 Chatlas</p>
        </footer>
    </div>
</body>
</html>
