<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flow Game - Conecta los puntos</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: #0a0f1e;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px; box-sizing: border-box;
        }
        .game-container {
            display: flex; flex-direction: column; align-items: center; gap: 18px;
            background: #161e2c; padding: 20px; border-radius: 56px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        canvas {
            display: block; margin: 0 auto; border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.5); background-color: #010409;
        }
        .info-panel {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; gap: 15px; background: #0e121fcc; backdrop-filter: blur(4px);
            padding: 6px 20px; border-radius: 60px; flex-wrap: wrap; justify-content: center;
        }
        .level-badge { background: #2a3a55; padding: 6px 18px; border-radius: 40px; color: white; font-weight: bold; font-size: 1rem; }
        button {
            background: #2d4a7c; border: none; color: white; font-weight: bold;
            font-size: 1rem; padding: 8px 24px; border-radius: 60px; cursor: pointer;
            font-family: inherit; box-shadow: 0 4px 0 #102a44; transform: translateY(-2px);
        }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #102a44; }
        .reset-btn { background: #4e3b6e; box-shadow: 0 4px 0 #2a1f3f; }
        .victory-msg {
            background: #2b7a4b; padding: 8px 20px; border-radius: 40px;
            font-weight: bold; color: #c6ffcf; font-size: 0.9rem; animation: pulse 0.8s;
        }
        @keyframes pulse { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        .level-selector { display: flex; gap: 12px; }
        .level-btn {
            background: #1f2a40; padding: 4px 18px; font-size: 0.9rem;
            box-shadow: 0 2px 0 #0b0f1a;
        }
        .level-btn.active {
            background: #3b6f9e; box-shadow: 0 0 8px #6aa9ff; border: 1px solid #9bc0ff;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="info-panel">
        <div class="level-badge" id="levelName">BÁSICO · 7x5</div>
        <div class="level-selector">
            <button class="level-btn" data-level="0">🌱 Básico</button>
            <button class="level-btn" data-level="1">⚡ Intermedio</button>
            <button class="level-btn" data-level="2">🔥 Avanzado</button>
        </div>
        <button id="resetButton" class="reset-btn">⟳ Reiniciar</button>
    </div>
    <div id="victoryMessage" style="min-height: 48px;"></div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const COLORS = [
    "#FF3366", // Rosa
    "#3A86FF", // Azul
    "#FFD166", // Amarillo
    "#06D6A0", // Verde menta
    "#9C27B0", // Púrpura
    "#FF6D00"  // Naranja
];

const LEVELS = [
    {   // Básico: 7x5 con 5 colores (10 puntos)
        rows: 5, cols: 7,
        dots: [
            { x: 0, y: 0, color: COLORS[0] }, { x: 6, y: 4, color: COLORS[0] },
            { x: 0, y: 1, color: COLORS[1] }, { x: 5, y: 4, color: COLORS[1] },
            { x: 1, y: 1, color: COLORS[2] }, { x: 5, y: 3, color: COLORS[2] },
            { x: 1, y: 2, color: COLORS[3] }, { x: 4, y: 3, color: COLORS[3] },
            { x: 2, y: 2, color: COLORS[4] }, { x: 4, y: 2, color: COLORS[4] }
        ]
    },
    {   // Intermedio: 9x9 con 6 colores (12 puntos)
        rows: 9, cols: 9,
        dots: [
            { x: 0, y: 0, color: COLORS[0] }, { x: 8, y: 8, color: COLORS[0] },
            { x: 7, y: 8, color: COLORS[1] }, { x: 0, y: 1, color: COLORS[1] },
            { x: 1, y: 1, color: COLORS[2] }, { x: 7, y: 7, color: COLORS[2] },
            { x: 6, y: 7, color: COLORS[3] }, { x: 1, y: 2, color: COLORS[3] },
            { x: 2, y: 2, color: COLORS[4] }, { x: 6, y: 6, color: COLORS[4] },
            { x: 5, y: 6, color: COLORS[5] }, { x: 5, y: 3, color: COLORS[5] }
        ]
    },
    {   // Avanzado: 8x11 con 6 colores (12 puntos)
        rows: 8, cols: 11,
        dots: [
            { x: 0, y: 0, color: COLORS[0] }, { x: 10, y: 7, color: COLORS[0] },
            { x: 9, y: 7, color: COLORS[1] }, { x: 0, y: 1, color: COLORS[1] },
            { x: 1, y: 1, color: COLORS[2] }, { x: 9, y: 6, color: COLORS[2] },
            { x: 8, y: 6, color: COLORS[3] }, { x: 1, y: 2, color: COLORS[3] },
            { x: 2, y: 2, color: COLORS[4] }, { x: 8, y: 5, color: COLORS[4] },
            { x: 7, y: 5, color: COLORS[5] }, { x: 2, y: 3, color: COLORS[5] }
        ]
    }
];

    let nivelActual = 0;
    let filas, columnas, puntos;
    let tamanoCelda = 60;
    let grilla = [];           // { colorOcupado: string|null, esInicio: boolean }
    let caminos = new Map();   // color → array de {x,y}
    let dibujando = false;
    let colorActual = null;
    let rutaTemporal = [];

    const levelNameSpan = document.getElementById("levelName");
    const victoryDiv = document.getElementById("victoryMessage");
    const resetBtn = document.getElementById("resetButton");

    function lanzarConfetti() {
        // Omited for brevity
    }

    function cargarNivel(indice) {
        nivelActual = indice;
        const datos = LEVELS[indice];
        filas = datos.rows; columnas = datos.cols;
        puntos = datos.dots.map(p => ({...p}));

        grilla = Array.from({length: filas}, () => 
            Array.from({length: columnas}, () => ({colorOcupado: null, esInicio: false}))
        );

        puntos.forEach(p => {
            grilla[p.y][p.x] = {colorOcupado: p.color, esInicio: true};
        });

        caminos.clear();
        new Set(puntos.map(p => p.color)).forEach(c => caminos.set(c, []));

        victoryDiv.innerHTML = "";
        dibujando = false; colorActual = null; rutaTemporal = [];

        ajustarTamaño();
        dibujarTodo();
    }

    function ajustarTamaño() {
        const max = Math.min(window.innerWidth - 60, 580);
        tamanoCelda = Math.max(20, Math.floor(Math.min(max / columnas, (window.innerHeight - 220) / filas)));
        canvas.width = columnas * tamanoCelda;
        canvas.height = filas * tamanoCelda;
    }

    function dibujarTodo() {
        ctx.fillStyle = "#010409";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grid
        ctx.strokeStyle = "#2a2f3f"; ctx.lineWidth = 1.8;
        for (let i = 0; i <= columnas; i++) {
            ctx.beginPath(); ctx.moveTo(i*tamanoCelda, 0); ctx.lineTo(i*tamanoCelda, canvas.height); ctx.stroke();
        }
        for (let j = 0; j <= filas; j++) {
            ctx.beginPath(); ctx.moveTo(0, j*tamanoCelda); ctx.lineTo(canvas.width, j*tamanoCelda); ctx.stroke();
        }

        // Caminos completos
        for (let [color, ruta] of caminos) {
            if (ruta.length > 1) dibujarLinea(color, ruta, false);
        }

        // Ruta temporal
        if (dibujando && rutaTemporal.length > 1) {
            dibujarLinea(colorActual, rutaTemporal, true);
        }

        // Puntos
        puntos.forEach(p => {
            const cx = (p.x + 0.5) * tamanoCelda;
            const cy = (p.y + 0.5) * tamanoCelda;
            const r = tamanoCelda * 0.33;

            ctx.shadowBlur = 8; ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.beginPath(); ctx.arc(cx - r*0.25, cy - r*0.25, r*0.28, 0, Math.PI*2); ctx.fill();
        });
    }

    function dibujarLinea(color, coords, esTemporal = false) {
        if (coords.length < 2) return;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = tamanoCelda * 0.39;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        if (esTemporal) {
            ctx.setLineDash([6, 8]);
            ctx.globalAlpha = 0.85;
        }
        ctx.shadowBlur = 15; ctx.shadowColor = color;

        ctx.beginPath();
        ctx.moveTo((coords[0].x + 0.5)*tamanoCelda, (coords[0].y + 0.5)*tamanoCelda);
        for (let i = 1; i < coords.length; i++) {
            ctx.lineTo((coords[i].x + 0.5)*tamanoCelda, (coords[i].y + 0.5)*tamanoCelda);
        }
        ctx.stroke();
        ctx.restore();
    }

    function obtenerCoordenadas(e) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        const col = Math.floor(x / tamanoCelda * (canvas.width / rect.width));
        const row = Math.floor(y / tamanoCelda * (canvas.height / rect.height));
        if (col >= 0 && col < columnas && row >= 0 && row < filas) return {x: col, y: row};
        return null;
    }

    function esAdyacente(a, b) {
        return Math.abs(a.x - b.x) + Math.abs(a.y - b.y) === 1;
    }

    function celdaDisponible(x, y, color) {
        if (x < 0 || x >= columnas || y < 0 || y >= filas) return false;
        const cel = grilla[y][x];

        // Solo bloquea si se intenta cruzar sobre el PINCHO (Punto) de otro color
        if (cel.esInicio) return cel.colorOcupado === color;

        // No repetir celda actual por la que ya estamos trazando
        if (rutaTemporal.some(p => p.x === x && p.y === y)) return false;

        return true;
    }

    function iniciarDibujo(e) {
        // Solo bloquear si ganaste por completo (no si tira advertencia naranjita)
        if (victoryDiv.innerHTML.includes("🎉")) return;
        victoryDiv.innerHTML = "";
        
        e.preventDefault();
        const pos = obtenerCoordenadas(e);
        if (!pos) return;

        const punto = puntos.find(p => p.x === pos.x && p.y === pos.y);
        if (!punto) return;

        const color = punto.color;

        // Borrar camino anterior del mismo color
        if (caminos.get(color)?.length > 0) {
            caminos.get(color).forEach(c => {
                if (!grilla[c.y][c.x].esInicio) grilla[c.y][c.x].colorOcupado = null;
            });
            caminos.set(color, []);
            dibujarTodo();
        }

        dibujando = true;
        colorActual = color;
        rutaTemporal = [{x: pos.x, y: pos.y}];
        dibujarTodo();
    }

    function moverDibujo(e) {
        if (!dibujando) return;
        e.preventDefault();
        const pos = obtenerCoordenadas(e);
        if (!pos) return;

        const ultimo = rutaTemporal[rutaTemporal.length-1];
        if (ultimo.x === pos.x && ultimo.y === pos.y) return;

        // MEJORA: Permitir ir hacia atrás para poder borrar lo propio
        if (rutaTemporal.length > 1) {
            const penultimo = rutaTemporal[rutaTemporal.length-2];
            if (penultimo.x === pos.x && penultimo.y === pos.y) {
                rutaTemporal.pop(); // Borra la pisada
                dibujarTodo();
                return;
            }
        }

        if (!esAdyacente(ultimo, pos)) return;
        if (!celdaDisponible(pos.x, pos.y, colorActual)) return;

        // LÓGICA DE CRUCE: Cortar caminos de otros colores
        const cel = grilla[pos.y][pos.x];
        if (cel.colorOcupado !== null && cel.colorOcupado !== colorActual) {
            const colorCortado = cel.colorOcupado;
            const rutaCortada = caminos.get(colorCortado);
            if (rutaCortada) {
                const idx = rutaCortada.findIndex(p => p.x === pos.x && p.y === pos.y);
                if (idx !== -1) {
                    const nuevaRuta = rutaCortada.slice(0, idx); // Hasta el corte
                    // Quitar registro de grilla del tramo que queda suelto
                    for (let i = idx; i < rutaCortada.length; i++) {
                        const c = rutaCortada[i];
                        if (!grilla[c.y][c.x].esInicio) grilla[c.y][c.x].colorOcupado = null;
                    }
                    caminos.set(colorCortado, nuevaRuta);
                }
            }
        }

        rutaTemporal.push({x: pos.x, y: pos.y});
        dibujarTodo();
    }

    function finalizarDibujo() {
        if (!dibujando || rutaTemporal.length < 2) {
            dibujando = false; rutaTemporal = []; dibujarTodo(); return;
        }

        const color = colorActual;
        const extremos = puntos.filter(p => p.color === color);
        const primero = rutaTemporal[0];
        const ultimo = rutaTemporal[rutaTemporal.length-1];

        // LÓGICA DE VICTORIA: Validamos estrictamente conectar extremo 0 al extremo 1
        const conectaExtremo0 = (primero.x === extremos[0].x && primero.y === extremos[0].y) || 
                                (ultimo.x === extremos[0].x && ultimo.y === extremos[0].y);
        const conectaExtremo1 = (primero.x === extremos[1].x && primero.y === extremos[1].y) || 
                                (ultimo.x === extremos[1].x && ultimo.y === extremos[1].y);

        if (conectaExtremo0 && conectaExtremo1) {
            // Marcar celdas ocupadas oficiales
            for (let i = 1; i < rutaTemporal.length - 1; i++) {
                const c = rutaTemporal[i];
                if (!grilla[c.y][c.x].esInicio) grilla[c.y][c.x].colorOcupado = color;
            }
            caminos.set(color, [...rutaTemporal]);

            // Comprobar completados
            let completados = 0;
            for (let ruta of caminos.values()) {
                if (ruta.length > 1) completados++;
            }

            // Comprobar que no hayan quedado casillas vacías (Regla del Flow)
            let celdasVacias = 0;
            for (let y = 0; y < filas; y++) {
                for (let x = 0; x < columnas; x++) {
                    if (grilla[y][x].colorOcupado === null) celdasVacias++;
                }
            }

            if (completados === puntos.length / 2) {
                if (celdasVacias === 0) {
                    victoryDiv.innerHTML = '<div class="victory-msg">🎉 ¡NIVEL COMPLETADO! 🎉</div>';
                    lanzarConfetti();
                } else {
                    victoryDiv.innerHTML = '<div class="victory-msg" style="background:#d4841b; color:#fff;">⚠️ ¡Faltan celdas por cubrir!</div>';
                }
            }
        }

        dibujando = false;
        colorActual = null;
        rutaTemporal = [];
        dibujarTodo();
    }

    canvas.addEventListener('mousedown', iniciarDibujo);
    window.addEventListener('mousemove', moverDibujo);
    window.addEventListener('mouseup', finalizarDibujo);

    canvas.addEventListener('touchstart', iniciarDibujo, {passive: false});
    canvas.addEventListener('touchmove', moverDibujo, {passive: false});
    canvas.addEventListener('touchend', finalizarDibujo);

    resetBtn.addEventListener('click', () => cargarNivel(nivelActual));

    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const lvl = parseInt(btn.dataset.level);
            cargarNivel(lvl);
            levelNameSpan.textContent = ["BÁSICO · 7x5", "INTERMEDIO · 9x9", "AVANZADO · 8x11"][lvl];
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    window.addEventListener('resize', () => { ajustarTamaño(); dibujarTodo(); });

    cargarNivel(0);
    document.querySelector('.level-btn[data-level="0"]').classList.add('active');
</script>
</body>
</html>
