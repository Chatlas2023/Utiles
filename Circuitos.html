<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flow Clone - 3 Niveles | Conecta los puntos</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            touch-action: none;
            padding: 16px;
            box-sizing: border-box;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            background: #161e2c;
            padding: 20px 18px 22px 18px;
            border-radius: 56px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
            cursor: pointer;
            touch-action: none;
            background-color: #010409;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 20px;
            background: #0e121fcc;
            backdrop-filter: blur(4px);
            padding: 6px 20px;
            border-radius: 60px;
        }

        .level-badge {
            background: #2a3a55;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 1rem;
            box-shadow: inset 0 -1px 0 #3f5270, 0 4px 8px rgba(0,0,0,0.2);
        }

        button {
            background: #2d4a7c;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 4px 0 #102a44;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #102a44;
        }
        .reset-btn {
            background: #4e3b6e;
            box-shadow: 0 4px 0 #2a1f3f;
        }
        .victory-msg {
            background: #2b7a4b;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #c6ffcf;
            font-size: 0.9rem;
            animation: pulse 0.8s;
        }
        @keyframes pulse {
            0% { opacity: 0; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1);}
        }
        .level-selector {
            display: flex;
            gap: 12px;
        }
        .level-btn {
            background: #1f2a40;
            padding: 4px 18px;
            font-size: 0.9rem;
            box-shadow: 0 2px 0 #0b0f1a;
        }
        .level-btn.active {
            background: #3b6f9e;
            box-shadow: 0 0 8px #6aa9ff;
            border: 1px solid #9bc0ff;
        }
        @media (max-width: 600px) {
            .info-panel { gap: 10px; flex-wrap: wrap; justify-content: center; }
            .level-selector { order: 1; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div class="info-panel">
            <div class="level-badge" id="levelName">BÁSICO · 7x5</div>
            <div class="level-selector">
                <button class="level-btn" data-level="0">🌱 Básico</button>
                <button class="level-btn" data-level="1">⚡ Intermedio</button>
                <button class="level-btn" data-level="2">🔥 Avanzado</button>
            </div>
            <button id="resetButton" class="reset-btn">⟳ Reiniciar nivel</button>
        </div>
        <div id="victoryMessage" style="min-height: 48px;"></div>
    </div>
</div>

<script>
    (function(){
        // ---------- DEFINICIÓN DE NIVELES ----------
        // Cada nivel: rows, cols, dots (array de {x, y, color})
        // Colores vibrantes tipo flow
        const COLOR_PALETTE = [
            "#FF3366", // rosa intenso
            "#3A86FF", // azul eléctrico
            "#FFD166", // amarillo
            "#06D6A0", // menta
            "#EF476F", // coral
            "#9C89B8", // lavanda
            "#F25F5C", // rojo ladrillo
            "#70D6FF"  // cyan claro
        ];

        // ----- NIVEL 0: Básico · 7x5 · 5 colores (10 puntos) -----
        const level0 = {
            rows: 5,
            cols: 7,
            dots: [
                { x: 0, y: 0, color: COLOR_PALETTE[0] }, { x: 6, y: 4, color: COLOR_PALETTE[0] },  // rosa
                { x: 1, y: 2, color: COLOR_PALETTE[1] }, { x: 5, y: 2, color: COLOR_PALETTE[1] },  // azul
                { x: 2, y: 0, color: COLOR_PALETTE[2] }, { x: 4, y: 0, color: COLOR_PALETTE[2] },  // amarillo
                { x: 3, y: 4, color: COLOR_PALETTE[3] }, { x: 5, y: 3, color: COLOR_PALETTE[3] },  // menta
                { x: 0, y: 4, color: COLOR_PALETTE[4] }, { x: 2, y: 4, color: COLOR_PALETTE[4] }   // coral
            ]
        };

        // ----- NIVEL 1: Intermedio · 9x9 · 6 colores (12 puntos) -----
        const level1 = {
            rows: 9,
            cols: 9,
            dots: [
                { x: 0, y: 0, color: COLOR_PALETTE[0] }, { x: 8, y: 8, color: COLOR_PALETTE[0] },  // rosa
                { x: 2, y: 1, color: COLOR_PALETTE[1] }, { x: 7, y: 4, color: COLOR_PALETTE[1] },  // azul
                { x: 4, y: 0, color: COLOR_PALETTE[2] }, { x: 4, y: 8, color: COLOR_PALETTE[2] },  // amarillo
                { x: 1, y: 5, color: COLOR_PALETTE[3] }, { x: 6, y: 5, color: COLOR_PALETTE[3] },  // menta
                { x: 3, y: 7, color: COLOR_PALETTE[4] }, { x: 5, y: 7, color: COLOR_PALETTE[4] },  // coral
                { x: 0, y: 4, color: COLOR_PALETTE[5] }, { x: 8, y: 2, color: COLOR_PALETTE[5] }   // lavanda
            ]
        };

        // ----- NIVEL 2: Avanzado · 8x11 · 6 colores (12 puntos) - diseño más enredado -----
        const level2 = {
            rows: 8,
            cols: 11,
            dots: [
                { x: 0, y: 0, color: COLOR_PALETTE[0] }, { x: 10, y: 7, color: COLOR_PALETTE[0] },  // rosa extremo
                { x: 2, y: 2, color: COLOR_PALETTE[1] }, { x: 8, y: 5, color: COLOR_PALETTE[1] },  // azul
                { x: 4, y: 0, color: COLOR_PALETTE[2] }, { x: 6, y: 7, color: COLOR_PALETTE[2] },  // amarillo
                { x: 1, y: 4, color: COLOR_PALETTE[3] }, { x: 9, y: 2, color: COLOR_PALETTE[3] },  // menta
                { x: 3, y: 6, color: COLOR_PALETTE[4] }, { x: 5, y: 3, color: COLOR_PALETTE[4] },  // coral
                { x: 7, y: 1, color: COLOR_PALETTE[5] }, { x: 2, y: 7, color: COLOR_PALETTE[5] }    // lavanda
            ]
        };

        const LEVELS = [level0, level1, level2];
        let currentLevelIdx = 0;          // 0: básico, 1: intermedio, 2: avanzado

        // Estado del juego
        let rows, cols, dots;              // datos del nivel activo
        let cellSize = 0;
        let canvas, ctx;

        // Grid de trazado: cada celda almacena { color: string | null, isStart: boolean, pathId: number|null }
        // Adicionalmente guardamos para cada conexión los segmentos.
        let grid = [];          // matriz [row][col] -> { color, isStart, pathOrder }
        let connections = new Map(); // clave: color -> array de rutas (coordenadas conectadas en orden)
        let activeDrawing = false;
        let currentColorDrawing = null;
        let currentPathCoords = [];   // {x, y} actual mientras se dibuja
        let startDotPos = null;       // posición del nodo inicial desde el que se empezó

        let victoryFlag = false;

        // elementos DOM
        const levelNameSpan = document.getElementById("levelName");
        const victoryDiv = document.getElementById("victoryMessage");
        const resetBtn = document.getElementById("resetButton");

        // Inicialización completa
        function loadLevel(levelIndex) {
            currentLevelIdx = levelIndex;
            const levelData = LEVELS[currentLevelIdx];
            rows = levelData.rows;
            cols = levelData.cols;
            // clonar puntos para no referenciar el original
            dots = levelData.dots.map(d => ({ ...d, color: d.color }));

            // Inicializar grid vacío
            grid = Array(rows).fill().map(() => Array(cols).fill().map(() => ({ color: null, isStart: false, pathOrder: -1 })));
            
            // Registrar puntos iniciales en grid
            dots.forEach(dot => {
                if (dot.x >= 0 && dot.x < cols && dot.y >= 0 && dot.y < rows) {
                    grid[dot.y][dot.x] = { color: dot.color, isStart: true, pathOrder: 0 };
                }
            });

            // Limpiar mapa de conexiones (cada color guarda sus celdas trazadas)
            connections.clear();
            // Para cada color, reconstruimos la conexión actualmente vacía (solo los dos puntos no conectados)
            // Inicialmente no hay rutas, pero marcamos que los puntos pertenecen a cada color en el mapa de conexiones
            const uniqueColors = [...new Map(dots.map(d => [d.color, d.color])).values()];
            uniqueColors.forEach(color => {
                connections.set(color, []);  // array de posiciones conectadas (sin incluir los endpoints? incluiremos todo)
                // Para simplificar, después agregamos los puntos inicio como parte de la ruta virtual
            });
            
            // Inicialmente registramos los puntos iniciales en las conexiones para validación simple
            // Pero como no hay camino, necesitamos que el array de celdas camino incluya al menos los nodos al finalizar.
            // Para mantener lógica: connections[color] guarda todas las celdas ocupadas por ese color (incluyendo inicio y fin)
            // Como aún no se ha trazado, estará vacío. En cada trazado completado actualizaremos.
            
            victoryFlag = false;
            victoryDiv.innerHTML = "";
            activeDrawing = false;
            currentColorDrawing = null;
            currentPathCoords = [];
            startDotPos = null;
            adjustCanvasSizeAndDraw();
        }

        // Ajusta el canvas según cellSize y redibuja todo
        function adjustCanvasSizeAndDraw() {
            const container = document.querySelector('.game-container');
            const maxWidth = Math.min(window.innerWidth - 48, 650);
            const maxHeight = window.innerHeight - 160;
            const widthByCols = maxWidth / cols;
            const heightByRows = maxHeight / rows;
            cellSize = Math.min(widthByCols, heightByRows, 72); // límite visual
            canvas.width = cols * cellSize;
            canvas.height = rows * cellSize;
            canvas.style.width = `${canvas.width}px`;
            canvas.style.height = `${canvas.height}px`;
            fullRedraw();
        }

        // dibujar grid completo, conexiones almacenadas + trazo actual temporal
        function fullRedraw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // dibujar fondo y cuadrícula
            ctx.fillStyle = "#010409";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#2a2f3f";
            ctx.lineWidth = 1.5;
            for (let i = 0; i <= cols; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();
            }
            for (let j = 0; j <= rows; j++) {
                ctx.beginPath();
                ctx.moveTo(0, j * cellSize);
                ctx.lineTo(canvas.width, j * cellSize);
                ctx.stroke();
            }
            
            // dibujar rutas guardadas (connections)
            for (let [color, pathCells] of connections.entries()) {
                if (pathCells.length === 0) continue;
                drawPathSegments(color, pathCells);
            }
            
            // dibujar trazo actual (si está dibujando)
            if (activeDrawing && currentPathCoords.length > 1 && currentColorDrawing) {
                drawPathSegments(currentColorDrawing, currentPathCoords);
            }
            
            // dibujar puntos (nodos) encima de todo
            dots.forEach(dot => {
                const cx = (dot.x + 0.5) * cellSize;
                const cy = (dot.y + 0.5) * cellSize;
                ctx.fillStyle = dot.color;
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(cx, cy, cellSize * 0.32, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffffffcc";
                ctx.beginPath();
                ctx.arc(cx, cy, cellSize * 0.12, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = dot.color;
                ctx.beginPath();
                ctx.arc(cx, cy, cellSize * 0.18, 0, Math.PI*2);
                ctx.fill();
            });
        }

        // dibuja una lista de celdas {x, y} en orden con el color indicado (línea gruesa redondeada)
        function drawPathSegments(color, coordsArray) {
            if (!coordsArray || coordsArray.length < 2) return;
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = cellSize * 0.38;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            const first = coordsArray[0];
            ctx.moveTo((first.x + 0.5) * cellSize, (first.y + 0.5) * cellSize);
            for (let i = 1; i < coordsArray.length; i++) {
                const p = coordsArray[i];
                ctx.lineTo((p.x + 0.5) * cellSize, (p.y + 0.5) * cellSize);
            }
            ctx.stroke();
            // dibujar puntos intermedios sutiles
            ctx.restore();
        }

        // validar si un movimiento es ortogonalmente adyacente (recto, sin diagonales)
        function isOrthogonalAdjacent(p1, p2) {
            return (Math.abs(p1.x - p2.x) + Math.abs(p1.y - p2.y)) === 1;
        }

        // comprueba si la celda es válida para pintar (no pertenece a otro color fijo, no es start de otro color, no está ocupada por otra ruta completa)
        function canExtendToCell(x, y, color, ignoreCurrentTemp = true) {
            if (x < 0 || x >= cols || y < 0 || y >= rows) return false;
            const cell = grid[y][x];
            // si es punto de inicio y no coincide con el color actual (o no es el punto de inicio original de este color) rechazar
            if (cell.isStart) {
                // Buscar si este punto pertenece al color actual
                const belongsToCurrent = dots.some(d => d.x === x && d.y === y && d.color === color);
                if (!belongsToCurrent) return false;
                // si es el punto de destino (segundo punto del color) o el inicio, solo se puede pisar SI es exactamente el otro extremo y estamos finalizando
                return true; // Permitirá conectar con el otro punto siempre que se cumpla que el path finalice justo ahí
            }
            // Si la celda ya tiene un color asignado (de conexiones permanentes) y está ocupada por otra ruta completa -> prohibido
            if (cell.color !== null && cell.color !== color) return false;
            // Si temporalmente estamos dibujando y esa celda ya pertenece al path actual (evitar ciclos inmediatos)
            if (ignoreCurrentTemp && currentPathCoords.some(p => p.x === x && p.y === y)) return false;
            return true;
        }

        // guardar ruta completa al soltar
        function commitPath() {
            if (!activeDrawing) return false;
            if (currentPathCoords.length < 2) {
                cancelDrawing();
                return false;
            }
            
            const color = currentColorDrawing;
            // buscar los dos puntos de este color
            const dotEndpoints = dots.filter(d => d.color === color);
            if (dotEndpoints.length !== 2) {
                cancelDrawing();
                return false;
            }
            const start = dotEndpoints[0];
            const end = dotEndpoints[1];
            
            // validar que el primer punto del trazado sea uno de los extremos
            const firstCoord = currentPathCoords[0];
            const lastCoord = currentPathCoords[currentPathCoords.length-1];
            const validStart = (firstCoord.x === start.x && firstCoord.y === start.y) || (firstCoord.x === end.x && firstCoord.y === end.y);
            const validEnd = (lastCoord.x === start.x && lastCoord.y === start.y) || (lastCoord.x === end.x && lastCoord.y === end.y);
            if (!validStart || !validEnd || (firstCoord.x === lastCoord.x && firstCoord.y === lastCoord.y)) {
                cancelDrawing();
                return false;
            }
            
            // Verificar que cada paso sea ortogonal (solo movimientos rectos)
            for (let i = 1; i < currentPathCoords.length; i++) {
                if (!isOrthogonalAdjacent(currentPathCoords[i-1], currentPathCoords[i])) {
                    cancelDrawing();
                    return false;
                }
            }
            
            // Verificar que todas las celdas del trazado (excepto extremos) estén libres y no conflictos
            for (let i = 1; i < currentPathCoords.length - 1; i++) {
                const cell = currentPathCoords[i];
                const gridCell = grid[cell.y][cell.x];
                if (gridCell.color !== null && gridCell.color !== color) {
                    cancelDrawing();
                    return false;
                }
                if (gridCell.isStart === true) {
                    // no puede pasar por otro nodo inicio de otro color
                    const isOwnStart = (cell.x === start.x && cell.y === start.y) || (cell.x === end.x && cell.y === end.y);
                    if (!isOwnStart) {
                        cancelDrawing();
                        return false;
                    }
                }
            }
            
            // Confirmar que no hay rutas existentes de este color previas (para resetear conexión anterior)
            // eliminamos la conexión anterior para este color si existía
            const oldPath = connections.get(color) || [];
            // Liberar las celdas ocupadas anteriormente por este color en grid
            if (oldPath.length > 0) {
                for (let cell of oldPath) {
                    if (grid[cell.y] && grid[cell.y][cell.x] && !grid[cell.y][cell.x].isStart) {
                        grid[cell.y][cell.x].color = null;
                        grid[cell.y][cell.x].pathOrder = -1;
                    }
                }
            }
            
            // Ahora asignamos el nuevo trazado
            const newPathCoords = [...currentPathCoords];
            // actualizar grid: marcar todas las celdas (excepto puntos inicio que siguen siendo inicio)
            for (let i = 0; i < newPathCoords.length; i++) {
                const cell = newPathCoords[i];
                const isEndpoint = (cell.x === start.x && cell.y === start.y) || (cell.x === end.x && cell.y === end.y);
                if (!isEndpoint) {
                    grid[cell.y][cell.x].color = color;
                    grid[cell.y][cell.x].isStart = false;
                    grid[cell.y][cell.x].pathOrder = i;
                }
            }
            connections.set(color, newPathCoords);
            
            // Verificar si todas las conexiones están completas (victoria)
            const totalColors = dots.length / 2;
            let completed = 0;
            for (let [col, pathArray] of connections.entries()) {
                if (pathArray.length > 1) completed++;
            }
            if (completed === totalColors) {
                victoryFlag = true;
                victoryDiv.innerHTML = '<div class="victory-msg">✨ ¡NIVEL COMPLETADO! ✨</div>';
                activeDrawing = false;
                fullRedraw();
                return true;
            }
            
            cancelDrawing(); // reset temporal y redibuja
            fullRedraw();
            return true;
        }
        
        function cancelDrawing() {
            activeDrawing = false;
            currentColorDrawing = null;
            currentPathCoords = [];
            startDotPos = null;
            fullRedraw();
        }
        
        // Manejo de inicio de dibujo
        function onPointerStart(e) {
            if (victoryFlag) return;
            e.preventDefault();
            const pos = getCanvasCoords(e);
            if (!pos) return;
            // buscar si tocamos un punto de inicio de algún color
            const dotHere = dots.find(d => d.x === pos.x && d.y === pos.y);
            if (!dotHere) return;
            const color = dotHere.color;
            // Verificar si este color ya tiene un camino completo (connections) y aún no está reseteado? Para Flow se permite redibujar encima, borramos previa
            const existing = connections.get(color);
            if (existing && existing.length > 0) {
                // Limpiar la ruta anterior para permitir redibujar
                const old = connections.get(color);
                for (let cell of old) {
                    if (grid[cell.y] && grid[cell.y][cell.x] && !grid[cell.y][cell.x].isStart) {
                        grid[cell.y][cell.x].color = null;
                    }
                }
                connections.set(color, []);
                fullRedraw();
            }
            // Iniciar nuevo trazado
            activeDrawing = true;
            currentColorDrawing = color;
            startDotPos = { x: dotHere.x, y: dotHere.y };
            currentPathCoords = [{ x: dotHere.x, y: dotHere.y }];
            fullRedraw(); // limpia y muestra inicio
        }
        
        function onPointerMove(e) {
            if (!activeDrawing || victoryFlag) return;
            e.preventDefault();
            const pos = getCanvasCoords(e);
            if (!pos) return;
            const last = currentPathCoords[currentPathCoords.length-1];
            if (last.x === pos.x && last.y === pos.y) return;
            if (!isOrthogonalAdjacent(last, pos)) return;
            // verificar si podemos agregar esta celda (sin conflictos)
            if (!canExtendToCell(pos.x, pos.y, currentColorDrawing, true)) return;
            // Chequear si estamos llegando al nodo final de nuestro color
            const dotEndpoints = dots.filter(d => d.color === currentColorDrawing);
            const isTargetNode = (pos.x === dotEndpoints[0].x && pos.y === dotEndpoints[0].y) || (pos.x === dotEndpoints[1].x && pos.y === dotEndpoints[1].y);
            // si es el nodo final y no es el mismo que el inicio, y tenemos al menos 1 segmento, podríamos terminar, pero aún no soltamos.
            if (isTargetNode && !(startDotPos.x === pos.x && startDotPos.y === pos.y)) {
                // permitimos agregar el nodo final y luego soltará
                currentPathCoords.push({ x: pos.x, y: pos.y });
                fullRedraw();
                // Commite automático al tocar el nodo final? Lo haremos en pointerEnd para complete
                return;
            }
            // evitar que entre en un nodo ajeno
            const otherDot = dots.find(d => d.x === pos.x && d.y === pos.y && d.color !== currentColorDrawing);
            if (otherDot) return;
            // celda intermedia normal
            currentPathCoords.push({ x: pos.x, y: pos.y });
            fullRedraw();
        }
        
        function onPointerEnd(e) {
            if (!activeDrawing || victoryFlag) {
                activeDrawing = false;
                cancelDrawing();
                return;
            }
            e.preventDefault();
            // validar camino y guardar si cumple conecta los dos puntos
            commitPath();
            activeDrawing = false;
            currentColorDrawing = null;
            currentPathCoords = [];
            startDotPos = null;
            fullRedraw();
        }
        
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                if (e.touches.length === 0) return null;
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            if (canvasX < 0 || canvasY < 0) return null;
            const col = Math.floor(canvasX / cellSize);
            const row = Math.floor(canvasY / cellSize);
            if (col >= 0 && col < cols && row >= 0 && row < rows) return { x: col, y: row };
            return null;
        }
        
        function resetLevel() {
            loadLevel(currentLevelIdx);
            activeDrawing = false;
            victoryFlag = false;
            victoryDiv.innerHTML = "";
            fullRedraw();
        }
        
        function changeLevel(index) {
            currentLevelIdx = index;
            loadLevel(currentLevelIdx);
            const names = ["BÁSICO · 7x5", "INTERMEDIO · 9x9", "AVANZADO · 8x11"];
            levelNameSpan.innerText = names[currentLevelIdx];
            victoryDiv.innerHTML = "";
            victoryFlag = false;
            activeDrawing = false;
            fullRedraw();
        }
        
        // event listeners y resize
        function bindEvents() {
            canvas.addEventListener('mousedown', onPointerStart);
            window.addEventListener('mousemove', (e) => { if (activeDrawing) onPointerMove(e); });
            window.addEventListener('mouseup', onPointerEnd);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerStart(e); }, {passive: false});
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); onPointerMove(e); }, {passive: false});
            canvas.addEventListener('touchend', onPointerEnd);
            resetBtn.addEventListener('click', () => resetLevel());
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const lvl = parseInt(btn.dataset.level);
                    if (!isNaN(lvl)) changeLevel(lvl);
                    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            window.addEventListener('resize', () => adjustCanvasSizeAndDraw());
        }
        
        // Inicialización global
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        bindEvents();
        loadLevel(0);
        document.querySelector('.level-btn[data-level="0"]').classList.add('active');
        levelNameSpan.innerText = "BÁSICO · 7x5";
    })();
</script>
</body>
</html>
