<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flow Clone - 3 Niveles | Conecta los puntos + Confeti</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            touch-action: none;
            padding: 16px;
            box-sizing: border-box;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            background: #161e2c;
            padding: 20px 18px 22px 18px;
            border-radius: 56px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
            cursor: pointer;
            touch-action: none;
            background-color: #010409;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 20px;
            background: #0e121fcc;
            backdrop-filter: blur(4px);
            padding: 6px 20px;
            border-radius: 60px;
        }

        .level-badge {
            background: #2a3a55;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 1rem;
            box-shadow: inset 0 -1px 0 #3f5270, 0 4px 8px rgba(0,0,0,0.2);
        }

        button {
            background: #2d4a7c;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 4px 0 #102a44;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #102a44;
        }
        .reset-btn {
            background: #4e3b6e;
            box-shadow: 0 4px 0 #2a1f3f;
        }
        .victory-msg {
            background: #2b7a4b;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #c6ffcf;
            font-size: 0.9rem;
            animation: pulse 0.8s;
        }
        @keyframes pulse {
            0% { opacity: 0; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1);}
        }
        .level-selector {
            display: flex;
            gap: 12px;
        }
        .level-btn {
            background: #1f2a40;
            padding: 4px 18px;
            font-size: 0.9rem;
            box-shadow: 0 2px 0 #0b0f1a;
        }
        .level-btn.active {
            background: #3b6f9e;
            box-shadow: 0 0 8px #6aa9ff;
            border: 1px solid #9bc0ff;
        }
        @media (max-width: 600px) {
            .info-panel { gap: 10px; flex-wrap: wrap; justify-content: center; }
            .level-selector { order: 1; }
        }
        /* Canvas de confeti sobre todo pero sin bloquear interacción */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div class="info-panel">
            <div class="level-badge" id="levelName">BÁSICO · 7x5</div>
            <div class="level-selector">
                <button class="level-btn" data-level="0">🌱 Básico</button>
                <button class="level-btn" data-level="1">⚡ Intermedio</button>
                <button class="level-btn" data-level="2">🔥 Avanzado</button>
            </div>
            <button id="resetButton" class="reset-btn">⟳ Reiniciar nivel</button>
        </div>
        <div id="victoryMessage" style="min-height: 48px;"></div>
    </div>
    <canvas id="confetti-canvas"></canvas>
</div>

<script>
    (function(){
        // ---------- CONFETI (sistema ligero) ----------
        const confettiCanvas = document.getElementById('confetti-canvas');
        let confettiCtx = confettiCanvas.getContext('2d');
        let confettiActive = false;
        let particles = [];
        let animationId = null;
        
        function resizeConfettiCanvas() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeConfettiCanvas();
        });
        
        class ConfettiParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() - 0.5) * 7;
                this.speedY = Math.random() * 6 + 3;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 12;
                this.alpha = 1;
                this.decay = 0.98 + Math.random() * 0.015;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.2; // gravedad
                this.speedX *= 0.99;
                this.rotation += this.rotationSpeed;
                this.alpha *= this.decay;
                return this.alpha > 0.02 && this.y < window.innerHeight + 100;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size/1.5);
                ctx.restore();
            }
        }
        
        function launchConfetti() {
            if (animationId) cancelAnimationFrame(animationId);
            particles = [];
            resizeConfettiCanvas();
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 3;
            for (let i = 0; i < 150; i++) {
                const angle = (Math.random() - 0.5) * Math.PI * 0.8;
                const speed = 5 + Math.random() * 8;
                const vx = Math.sin(angle) * speed + (Math.random() - 0.5) * 3;
                const vy = -Math.abs(Math.cos(angle) * speed) - 2;
                const p = new ConfettiParticle(centerX + (Math.random() - 0.5) * 90, centerY);
                p.speedX = vx;
                p.speedY = vy;
                particles.push(p);
            }
            // adicionales laterales
            for (let i = 0; i < 80; i++) {
                const sideX = Math.random() * window.innerWidth;
                const p = new ConfettiParticle(sideX, -20);
                p.speedY = Math.random() * 5 + 4;
                p.speedX = (Math.random() - 0.5) * 4;
                particles.push(p);
            }
            confettiActive = true;
            function animateConfetti() {
                if (!confettiCtx) return;
                confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                let anyAlive = false;
                for (let i = 0; i < particles.length; i++) {
                    const alive = particles[i].update();
                    particles[i].draw(confettiCtx);
                    if (alive) anyAlive = true;
                }
                particles = particles.filter(p => p.alpha > 0.02);
                if (anyAlive && particles.length > 0) {
                    animationId = requestAnimationFrame(animateConfetti);
                } else {
                    confettiActive = false;
                    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                    animationId = null;
                }
            }
            animateConfetti();
            // auto stop después de 4 segundos por si acaso
            setTimeout(() => {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                }
            }, 4200);
        }

        // ---------- DEFINICIÓN DE NIVELES ----------
        const COLOR_PALETTE = [
            "#FF3366", "#3A86FF", "#FFD166", "#06D6A0", "#EF476F", "#9C89B8", "#F25F5C", "#70D6FF"
        ];

        const level0 = {
            rows: 5,
            cols: 7,
            dots: [
                { x: 0, y: 0, color: COLOR_PALETTE[0] }, { x: 6, y: 4, color: COLOR_PALETTE[0] },
                { x: 1, y: 2, color: COLOR_PALETTE[1] }, { x: 5, y: 2, color: COLOR_PALETTE[1] },
                { x: 2, y: 0, color: COLOR_PALETTE[2] }, { x: 4, y: 0, color: COLOR_PALETTE[2] },
                { x: 3, y: 4, color: COLOR_PALETTE[3] }, { x: 5, y: 3, color: COLOR_PALETTE[3] },
                { x: 0, y: 4, color: COLOR_PALETTE[4] }, { x: 2, y: 4, color: COLOR_PALETTE[4] }
            ]
        };

        const level1 = {
            rows: 9,
            cols: 9,
            dots: [
                { x: 0, y: 0, color: COLOR_PALETTE[0] }, { x: 8, y: 8, color: COLOR_PALETTE[0] },
                { x: 2, y: 1, color: COLOR_PALETTE[1] }, { x: 7, y: 4, color: COLOR_PALETTE[1] },
                { x: 4, y: 0, color: COLOR_PALETTE[2] }, { x: 4, y: 8, color: COLOR_PALETTE[2] },
                { x: 1, y: 5, color: COLOR_PALETTE[3] }, { x: 6, y: 5, color: COLOR_PALETTE[3] },
                { x: 3, y: 7, color: COLOR_PALETTE[4] }, { x: 5, y: 7, color: COLOR_PALETTE[4] },
                { x: 0, y: 4, color: COLOR_PALETTE[5] }, { x: 8, y: 2, color: COLOR_PALETTE[5] }
            ]
        };

        const level2 = {
            rows: 8,
            cols: 11,
            dots: [
                { x: 0, y: 0, color: COLOR_PALETTE[0] }, { x: 10, y: 7, color: COLOR_PALETTE[0] },
                { x: 2, y: 2, color: COLOR_PALETTE[1] }, { x: 8, y: 5, color: COLOR_PALETTE[1] },
                { x: 4, y: 0, color: COLOR_PALETTE[2] }, { x: 6, y: 7, color: COLOR_PALETTE[2] },
                { x: 1, y: 4, color: COLOR_PALETTE[3] }, { x: 9, y: 2, color: COLOR_PALETTE[3] },
                { x: 3, y: 6, color: COLOR_PALETTE[4] }, { x: 5, y: 3, color: COLOR_PALETTE[4] },
                { x: 7, y: 1, color: COLOR_PALETTE[5] }, { x: 2, y: 7, color: COLOR_PALETTE[5] }
            ]
        };

        const LEVELS = [level0, level1, level2];
        let currentLevelIdx = 0;
        let rows, cols, dots;
        let cellSize = 0;
        let canvas, ctx;

        let grid = [];
        let connections = new Map();
        let activeDrawing = false;
        let currentColorDrawing = null;
        let currentPathCoords = [];
        let startDotPos = null;
        let victoryFlag = false;

        const levelNameSpan = document.getElementById("levelName");
        const victoryDiv = document.getElementById("victoryMessage");
        const resetBtn = document.getElementById("resetButton");

        function loadLevel(levelIndex) {
            currentLevelIdx = levelIndex;
            const levelData = LEVELS[currentLevelIdx];
            rows = levelData.rows;
            cols = levelData.cols;
            dots = levelData.dots.map(d => ({ ...d, color: d.color }));

            grid = Array(rows).fill().map(() => Array(cols).fill().map(() => ({ color: null, isStart: false, pathOrder: -1 })));
            dots.forEach(dot => {
                if (dot.x >= 0 && dot.x < cols && dot.y >= 0 && dot.y < rows) {
                    grid[dot.y][dot.x] = { color: dot.color, isStart: true, pathOrder: 0 };
                }
            });

            connections.clear();
            const uniqueColors = [...new Map(dots.map(d => [d.color, d.color])).values()];
            uniqueColors.forEach(color => {
                connections.set(color, []);
            });
            
            victoryFlag = false;
            victoryDiv.innerHTML = "";
            activeDrawing = false;
            currentColorDrawing = null;
            currentPathCoords = [];
            startDotPos = null;
            adjustCanvasSizeAndDraw();
        }

        function adjustCanvasSizeAndDraw() {
            const maxWidth = Math.min(window.innerWidth - 48, 650);
            const maxHeight = window.innerHeight - 160;
            const widthByCols = maxWidth / cols;
            const heightByRows = maxHeight / rows;
            cellSize = Math.min(widthByCols, heightByRows, 72);
            canvas.width = cols * cellSize;
            canvas.height = rows * cellSize;
            canvas.style.width = `${canvas.width}px`;
            canvas.style.height = `${canvas.height}px`;
            fullRedraw();
        }

        function fullRedraw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#010409";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#2a2f3f";
            ctx.lineWidth = 1.5;
            for (let i = 0; i <= cols; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();
            }
            for (let j = 0; j <= rows; j++) {
                ctx.beginPath();
                ctx.moveTo(0, j * cellSize);
                ctx.lineTo(canvas.width, j * cellSize);
                ctx.stroke();
            }
            
            for (let [color, pathCells] of connections.entries()) {
                if (pathCells.length > 1) drawPathSegments(color, pathCells);
            }
            
            if (activeDrawing && currentPathCoords.length > 1 && currentColorDrawing) {
                drawPathSegments(currentColorDrawing, currentPathCoords);
            }
            
            dots.forEach(dot => {
                const cx = (dot.x + 0.5) * cellSize;
                const cy = (dot.y + 0.5) * cellSize;
                ctx.fillStyle = dot.color;
                ctx.beginPath();
                ctx.arc(cx, cy, cellSize * 0.32, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffffffcc";
                ctx.beginPath();
                ctx.arc(cx, cy, cellSize * 0.12, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = dot.color;
                ctx.beginPath();
                ctx.arc(cx, cy, cellSize * 0.18, 0, Math.PI*2);
                ctx.fill();
            });
        }

        function drawPathSegments(color, coordsArray) {
            if (!coordsArray || coordsArray.length < 2) return;
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = cellSize * 0.38;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            const first = coordsArray[0];
            ctx.moveTo((first.x + 0.5) * cellSize, (first.y + 0.5) * cellSize);
            for (let i = 1; i < coordsArray.length; i++) {
                const p = coordsArray[i];
                ctx.lineTo((p.x + 0.5) * cellSize, (p.y + 0.5) * cellSize);
            }
            ctx.stroke();
            ctx.restore();
        }

        function isOrthogonalAdjacent(p1, p2) {
            return (Math.abs(p1.x - p2.x) + Math.abs(p1.y - p2.y)) === 1;
        }

        function canExtendToCell(x, y, color, ignoreCurrentTemp = true) {
            if (x < 0 || x >= cols || y < 0 || y >= rows) return false;
            const cell = grid[y][x];
            if (cell.isStart) {
                const belongsToCurrent = dots.some(d => d.x === x && d.y === y && d.color === color);
                if (!belongsToCurrent) return false;
                return true;
            }
            if (cell.color !== null && cell.color !== color) return false;
            if (ignoreCurrentTemp && currentPathCoords.some(p => p.x === x && p.y === y)) return false;
            return true;
        }

        function commitPath() {
            if (!activeDrawing) return false;
            if (currentPathCoords.length < 2) {
                cancelDrawing();
                return false;
            }
            
            const color = currentColorDrawing;
            const dotEndpoints = dots.filter(d => d.color === color);
            if (dotEndpoints.length !== 2) {
                cancelDrawing();
                return false;
            }
            const start = dotEndpoints[0];
            const end = dotEndpoints[1];
            
            const firstCoord = currentPathCoords[0];
            const lastCoord = currentPathCoords[currentPathCoords.length-1];
            const validStart = (firstCoord.x === start.x && firstCoord.y === start.y) || (firstCoord.x === end.x && firstCoord.y === end.y);
            const validEnd = (lastCoord.x === start.x && lastCoord.y === start.y) || (lastCoord.x === end.x && lastCoord.y === end.y);
            if (!validStart || !validEnd || (firstCoord.x === lastCoord.x && firstCoord.y === lastCoord.y)) {
                cancelDrawing();
                return false;
            }
            
            for (let i = 1; i < currentPathCoords.length; i++) {
                if (!isOrthogonalAdjacent(currentPathCoords[i-1], currentPathCoords[i])) {
                    cancelDrawing();
                    return false;
                }
            }
            
            for (let i = 1; i < currentPathCoords.length - 1; i++) {
                const cell = currentPathCoords[i];
                const gridCell = grid[cell.y][cell.x];
                if (gridCell.color !== null && gridCell.color !== color) {
                    cancelDrawing();
                    return false;
                }
                if (gridCell.isStart === true) {
                    const isOwnStart = (cell.x === start.x && cell.y === start.y) || (cell.x === end.x && cell.y === end.y);
                    if (!isOwnStart) {
                        cancelDrawing();
                        return false;
                    }
                }
            }
            
            const oldPath = connections.get(color) || [];
            if (oldPath.length > 0) {
                for (let cell of oldPath) {
                    if (grid[cell.y] && grid[cell.y][cell.x] && !grid[cell.y][cell.x].isStart) {
                        grid[cell.y][cell.x].color = null;
                        grid[cell.y][cell.x].pathOrder = -1;
                    }
                }
            }
            
            const newPathCoords = [...currentPathCoords];
            for (let i = 0; i < newPathCoords.length; i++) {
                const cell = newPathCoords[i];
                const isEndpoint = (cell.x === start.x && cell.y === start.y) || (cell.x === end.x && cell.y === end.y);
                if (!isEndpoint) {
                    grid[cell.y][cell.x].color = color;
                    grid[cell.y][cell.x].isStart = false;
                    grid[cell.y][cell.x].pathOrder = i;
                }
            }
            connections.set(color, newPathCoords);
            
            // Verificar victoria
            const totalColors = dots.length / 2;
            let completed = 0;
            for (let [col, pathArray] of connections.entries()) {
                if (pathArray.length > 1) completed++;
            }
            if (completed === totalColors) {
                victoryFlag = true;
                victoryDiv.innerHTML = '<div class="victory-msg">🎉 ¡NIVEL COMPLETADO! 🎉</div>';
                // LANZAR CONFETI AL COMPLETAR EL NIVEL
                launchConfetti();
                activeDrawing = false;
                fullRedraw();
                return true;
            }
            
            cancelDrawing();
            fullRedraw();
            return true;
        }
        
        function cancelDrawing() {
            activeDrawing = false;
            currentColorDrawing = null;
            currentPathCoords = [];
            startDotPos = null;
            fullRedraw();
        }
        
        function onPointerStart(e) {
            if (victoryFlag) return;
            e.preventDefault();
            const pos = getCanvasCoords(e);
            if (!pos) return;
            const dotHere = dots.find(d => d.x === pos.x && d.y === pos.y);
            if (!dotHere) return;
            const color = dotHere.color;
            const existing = connections.get(color);
            if (existing && existing.length > 0) {
                const old = connections.get(color);
                for (let cell of old) {
                    if (grid[cell.y] && grid[cell.y][cell.x] && !grid[cell.y][cell.x].isStart) {
                        grid[cell.y][cell.x].color = null;
                    }
                }
                connections.set(color, []);
                fullRedraw();
            }
            activeDrawing = true;
            currentColorDrawing = color;
            startDotPos = { x: dotHere.x, y: dotHere.y };
            currentPathCoords = [{ x: dotHere.x, y: dotHere.y }];
            fullRedraw();
        }
        
        function onPointerMove(e) {
            if (!activeDrawing || victoryFlag) return;
            e.preventDefault();
            const pos = getCanvasCoords(e);
            if (!pos) return;
            const last = currentPathCoords[currentPathCoords.length-1];
            if (last.x === pos.x && last.y === pos.y) return;
            if (!isOrthogonalAdjacent(last, pos)) return;
            if (!canExtendToCell(pos.x, pos.y, currentColorDrawing, true)) return;
            const dotEndpoints = dots.filter(d => d.color === currentColorDrawing);
            const isTargetNode = (pos.x === dotEndpoints[0].x && pos.y === dotEndpoints[0].y) || (pos.x === dotEndpoints[1].x && pos.y === dotEndpoints[1].y);
            if (isTargetNode && !(startDotPos.x === pos.x && startDotPos.y === pos.y)) {
                currentPathCoords.push({ x: pos.x, y: pos.y });
                fullRedraw();
                return;
            }
            const otherDot = dots.find(d => d.x === pos.x && d.y === pos.y && d.color !== currentColorDrawing);
            if (otherDot) return;
            currentPathCoords.push({ x: pos.x, y: pos.y });
            fullRedraw();
        }
        
        function onPointerEnd(e) {
            if (!activeDrawing || victoryFlag) {
                activeDrawing = false;
                cancelDrawing();
                return;
            }
            e.preventDefault();
            commitPath();
            activeDrawing = false;
            currentColorDrawing = null;
            currentPathCoords = [];
            startDotPos = null;
            fullRedraw();
        }
        
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                if (e.touches.length === 0) return null;
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            if (canvasX < 0 || canvasY < 0) return null;
            const col = Math.floor(canvasX / cellSize);
            const row = Math.floor(canvasY / cellSize);
            if (col >= 0 && col < cols && row >= 0 && row < rows) return { x: col, y: row };
            return null;
        }
        
        function resetLevel() {
            loadLevel(currentLevelIdx);
            victoryFlag = false;
            victoryDiv.innerHTML = "";
            fullRedraw();
            // Si hay confeti activo se detiene visualmente (no molesta)
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
                if (confettiCtx) confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            }
        }
        
        function changeLevel(index) {
            currentLevelIdx = index;
            loadLevel(currentLevelIdx);
            const names = ["BÁSICO · 7x5", "INTERMEDIO · 9x9", "AVANZADO · 8x11"];
            levelNameSpan.innerText = names[currentLevelIdx];
            victoryDiv.innerHTML = "";
            victoryFlag = false;
            activeDrawing = false;
            fullRedraw();
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
                if (confettiCtx) confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            }
        }
        
        function bindEvents() {
            canvas.addEventListener('mousedown', onPointerStart);
            window.addEventListener('mousemove', (e) => { if (activeDrawing) onPointerMove(e); });
            window.addEventListener('mouseup', onPointerEnd);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerStart(e); }, {passive: false});
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); onPointerMove(e); }, {passive: false});
            canvas.addEventListener('touchend', onPointerEnd);
            resetBtn.addEventListener('click', () => resetLevel());
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const lvl = parseInt(btn.dataset.level);
                    if (!isNaN(lvl)) changeLevel(lvl);
                    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            window.addEventListener('resize', () => {
                adjustCanvasSizeAndDraw();
                resizeConfettiCanvas();
            });
        }
        
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        resizeConfettiCanvas();
        bindEvents();
        loadLevel(0);
        document.querySelector('.level-btn[data-level="0"]').classList.add('active');
        levelNameSpan.innerText = "BÁSICO · 7x5";
    })();
</script>
</body>
</html>
