<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bounce Game - Triple Shot & Explode 200</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-top: 10px;
            position: relative;
        }
        
        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-size: 14px;
            flex-wrap: wrap;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .sound-toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            order: 5;
        }
        
        .info-label {
            font-size: 0.7rem;
            color: #a9a9a9;
            margin-bottom: 3px;
        }
        
        .info-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }
        
        .lives { color: #e94560; }
        .score { color: #0fce7c; }
        .best { color: #ffd166; }
        .level { color: #9b5de5; }
        
        .game-area {
            position: relative;
            margin-bottom: 80px;
        }
        
        canvas {
            background-color: #000;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            display: block;
            margin: 0 auto;
            touch-action: none;
            width: 100%;
            max-width: 400px;
            height: 450px;
        }
        
        .controls {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        .angle-control {
            width: 100%;
            margin-bottom: 12px;
        }
        
        .angle-label {
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #a9a9a9;
        }
        
        .angle-slider {
            width: 100%;
            height: 25px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            outline: none;
        }
        
        .angle-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.7);
        }
        
        .fire-btn {
            background: linear-gradient(to right, #0fce7c, #4cd9a1);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(15, 206, 124, 0.4);
            margin-bottom: 12px;
            width: 100%;
            max-width: 200px;
            margin-top: 20px;
        }
        
        .fire-btn:active { transform: scale(0.95); }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
            display: none;
            z-index: 10;
            width: 80%;
            max-width: 350px;
        }
        .game-over h2 { color: #e94560; font-size: 1.7rem; margin-bottom: 12px; }
        .restart-btn, .continue-btn, .next-level-btn {
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .restart-btn { background: linear-gradient(to right, #0fce7c, #4cd9a1); color: white; }
        .continue-btn { background: linear-gradient(to right, #ffd166, #ffed99); color: #333; }
        .next-level-btn { background: linear-gradient(to right, #9b5de5, #c77dff); color: white; margin-top: 10px; width: 100%; }
        .game-over-buttons { display: flex; flex-direction: column; gap: 10px; }
        
        .level-complete {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 40px rgba(15, 206, 124, 0.7);
            display: none;
            z-index: 20;
            width: 85%;
            max-width: 380px;
            border: 3px solid #0fce7c;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 40px rgba(15, 206, 124, 0.7); }
            100% { box-shadow: 0 0 60px rgba(15, 206, 124, 0.9); }
        }
        .level-complete h2 { color: #0fce7c; font-size: 1.8rem; }
        .debug-btn {
            background: rgba(155, 93, 229, 0.8);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
            cursor: pointer;
        }
        .debug-buttons { position: fixed; bottom: 10px; left: 10px; display: flex; gap: 10px; z-index: 100; }
        .sound-toggle { background: rgba(0,0,0,0.3); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        @media (max-width: 500px) {
            canvas { height: 350px; }
            .info-value { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="level-indicator" id="levelIndicator">Level 1: Classic</div>
    <div class="game-info">
        <div class="info-item"><span class="info-label">LIVES</span><span class="info-value lives" id="lives">10</span></div>
        <div class="info-item"><span class="info-label">SCORE</span><span class="info-value score" id="score">0</span></div>
        <div class="info-item"><span class="info-label">BEST</span><span class="info-value best" id="best">0</span></div>
        <div class="info-item"><span class="info-label">LEVEL</span><span class="info-value level" id="level">1</span></div>
        <div class="sound-toggle-container"><button class="sound-toggle" id="soundToggle">🔊</button></div>
    </div>
    <div class="game-area"><canvas id="gameCanvas" width="400" height="450"></canvas></div>
    <div class="controls">
        <div class="angle-control"><div class="angle-label"><span id="angleValue">45°</span></div><input type="range" min="0" max="180" value="135" class="angle-slider" id="angleSlider"></div>
        <button class="fire-btn" id="fireBtn">GO!</button>
    </div>
</div>
<div class="game-over" id="gameOver"><h2>Game Over!</h2><p>Your score: <span id="finalScore">0</span></p><p>Best: <span id="finalBest">0</span></p><div class="game-over-buttons"><button class="restart-btn" id="restartBtn">PLAY AGAIN</button><button class="continue-btn" id="continueBtn">CONTINUE (+2 LIVES)</button></div></div>
<div class="level-complete" id="levelComplete"><h2>Level Complete!</h2><p>Level <span id="completedLevel">1</span> Completed</p><p>Score: <span id="levelScore">0</span></p><button class="next-level-btn" id="nextLevelBtn">NEXT LEVEL</button><button class="restart-btn" style="margin-top:10px;" id="menuBtn">LEVEL SELECT</button></div>
<div class="debug-buttons"><button class="debug-btn" id="skipBtn">Skip Level</button></div>

<script>
    (function(){
        // DOM elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const angleSlider = document.getElementById('angleSlider');
        const angleValue = document.getElementById('angleValue');
        const fireBtn = document.getElementById('fireBtn');
        const livesElement = document.getElementById('lives');
        const scoreElement = document.getElementById('score');
        const bestElement = document.getElementById('best');
        const levelElement = document.getElementById('level');
        const levelIndicator = document.getElementById('levelIndicator');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const finalBestElement = document.getElementById('finalBest');
        const restartBtn = document.getElementById('restartBtn');
        const continueBtn = document.getElementById('continueBtn');
        const soundToggle = document.getElementById('soundToggle');
        const levelCompleteElement = document.getElementById('levelComplete');
        const completedLevelElement = document.getElementById('completedLevel');
        const levelScoreElement = document.getElementById('levelScore');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const menuBtn = document.getElementById('menuBtn');
        const skipBtn = document.getElementById('skipBtn');

        // GAME STATE
        let circles = [];
        let projectiles = [];      // array of active projectiles (supports multiple balls)
        let lives = 10;
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') || 0;
        let gameActive = true;
        let animationId = null;
        let currentAngle = 135;
        let controlsMode = 'angle';   // 'angle' or 'paddle'
        let allCirclesCleared = false;
        let soundEnabled = true;
        
        // Triple shot queue: when firing, we launch 3 balls sequentially with small delay
        let pendingShots = 0;          // number of remaining balls to launch
        let shotTimer = null;           // timer between sequential shots
        
        // Level specific
        let currentLevel = 1;
        const maxLevels = 4;
        const levelThemes = { 1: ['#1a1a2e', '#16213e'], 2: ['#2d1b3d', '#4a235a'], 3: ['#1b3d2d', '#235a4a'], 4: ['#5d1b3d', '#8a235a'] };
        const levelNames = { 1: "Classic", 2: "Moving Circles", 3: "Small Paddle", 4: "Multi-Projectile" };
        const paddleSizes = { 1: 50, 2: 50, 3: 35, 4: 50 };
        const projectileSpeeds = { 1: 4.0, 2: 4.2, 3: 4.5, 4: 3.8 };
        
        // Nivel 4 specials
        let specialCircle = null;
        let multiProjectileActive = false;
        let multiProjectileTimer = 0;
        let specialCircleRespawnTimer = 0;
        let specialCircleActive = false;
        const MULTI_PROJECTILE_DURATION = 15000;
        const SPECIAL_CIRCLE_RESPAWN_TIME = 8000;
        const COLOR_CHANGE_INTERVAL = 500;
        
        // Paddle
        let paddle = { width: 50, height: 10, x: 175, y: canvas.height - 10, speed: 5, color: '#ffffff' };
        
        // Audio
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const bounceNotes = [392.00, 440.00, 493.88, 523.25];
        function playBounceSound(type = 'wall') {
            if (!soundEnabled) return;
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain); gain.connect(audioContext.destination);
                let freq = bounceNotes[Math.floor(Math.random() * bounceNotes.length)];
                if(type === 'paddle') { osc.type = 'square'; freq = 440; gain.gain.value = 0.12; }
                else if(type === 'circle') { osc.type = 'triangle'; freq *= 0.85; gain.gain.value = 0.16; }
                else { osc.type = 'sine'; gain.gain.value = 0.15; }
                osc.frequency.value = freq + (Math.random() * 20 - 10);
                gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.12);
                osc.start(); osc.stop(audioContext.currentTime + 0.12);
            } catch(e) {}
        }
        
        function toggleSound() { soundEnabled = !soundEnabled; soundToggle.textContent = soundEnabled ? '🔊' : '🔇'; localStorage.setItem('soundEnabled', soundEnabled); }
        if(localStorage.getItem('soundEnabled') !== null) { soundEnabled = localStorage.getItem('soundEnabled') === 'true'; soundToggle.textContent = soundEnabled ? '🔊' : '🔇'; }
        
        // Helper: resize & paddle pos
        function resizeCanvas() {
            const containerWidth = canvas.parentElement.clientWidth;
            const maxWidth = Math.min(400, containerWidth);
            canvas.width = maxWidth;
            canvas.height = 450;
            paddle.width = paddleSizes[currentLevel] || 50;
            paddle.x = (canvas.width - paddle.width) / 2;
            paddle.y = canvas.height - 10;
        }
        
        function circlesOverlap(c1, c2) { return Math.hypot(c1.x - c2.x, c1.y - c2.y) < (c1.radius + c2.radius + 10); }
        function isValidPosition(newCircle, existing) { return !existing.some(c => circlesOverlap(newCircle, c)); }
        
        // Circle class
        class Circle {
            constructor(x, y, diameter, level, isSpecial = false) {
                this.x = x; this.y = y; this.diameter = diameter; this.radius = diameter/2;
                this.level = level; this.isSpecial = isSpecial; this.activeTime = 0;
                this.color = this.getColor();
                if(level >= 2) { this.speedX = (Math.random() - 0.5)*1.5; this.speedY = (Math.random() - 0.5)*1.0; this.maxSpeed = 1.2 + level*0.2; }
                else { this.speedX = 0; this.speedY = 0; }
                this.minX = this.radius; this.maxX = canvas.width - this.radius;
                this.minY = this.radius + 20; this.maxY = canvas.height * 0.6;
            }
            getColor() {
                if(this.isSpecial) return ['#ffff00','#ffdd00','#ffaa00','#00ffff'][Math.floor(Math.random()*4)];
                const colors = ['#e94560','#ff6b6b','#0fce7c','#ffd166','#9b5de5','#f15bb5'];
                return colors[Math.floor(Math.random()*colors.length)];
            }
            update(deltaTime) {
                if(this.isSpecial) {
                    this.activeTime += deltaTime;
                    if(this.activeTime <= MULTI_PROJECTILE_DURATION && Math.floor(this.activeTime/COLOR_CHANGE_INTERVAL) !== Math.floor((this.activeTime-deltaTime)/COLOR_CHANGE_INTERVAL))
                        this.color = this.getColor();
                    else if(this.activeTime > MULTI_PROJECTILE_DURATION) this.color = '#ffff00';
                }
                if(this.level >= 2) {
                    this.x += this.speedX; this.y += this.speedY;
                    if(this.x <= this.minX || this.x >= this.maxX) { this.speedX = -this.speedX; this.x = Math.min(this.maxX, Math.max(this.minX, this.x)); }
                    if(this.y <= this.minY || this.y >= this.maxY) { this.speedY = -this.speedY; this.y = Math.min(this.maxY, Math.max(this.minY, this.y)); }
                    let spd = Math.hypot(this.speedX, this.speedY);
                    if(spd > this.maxSpeed) { this.speedX = (this.speedX/spd)*this.maxSpeed; this.speedY = (this.speedY/spd)*this.maxSpeed; }
                }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = this.color; ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                if(this.isSpecial) {
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText('×2', this.x, this.y);
                } else {
                    ctx.fillStyle = '#fff'; ctx.font = `${Math.max(10, this.radius/2)}px Arial`; ctx.fillText(this.diameter, this.x, this.y);
                }
            }
            grow() {
                let growth = Math.floor(Math.random() * 3) + 3;
                this.diameter += growth;
                this.radius = this.diameter / 2;
                this.minX = this.radius; this.maxX = canvas.width - this.radius;
                this.minY = this.radius + 20; this.maxY = canvas.height * 0.5;
            }
            // *** MODIFIED: explode when diameter >= 200 (was 300) ***
            shouldDisappear() { return this.diameter >= 200; }
        }
        
        // Projectile class (single ball)
        class Projectile {
            constructor(x, y, angle, isChild = false) {
                this.x = x; this.y = y; this.radius = 7; this.active = true; this.isChild = isChild;
                this.speed = isChild ? 3.5 : projectileSpeeds[currentLevel] || 4.0;
                let rad = (180 - angle) * Math.PI/180;
                this.vx = this.speed * Math.cos(rad);
                this.vy = -this.speed * Math.sin(rad);
                this.color = isChild ? '#ffaa00' : '#ffffff';
                this.lastCollision = 0; this.collisionCD = 60;
            }
            update() {
                if(!this.active) return;
                let now = Date.now();
                this.x += this.vx; this.y += this.vy;
                let spd = Math.hypot(this.vx, this.vy);
                let minSpd = this.isChild ? 2.5 : 3.0, maxSpd = this.isChild ? 4.5 : 5.5;
                if(spd < minSpd && spd>0) { let r = minSpd/spd; this.vx*=r; this.vy*=r; }
                if(spd > maxSpd) { let r = maxSpd/spd; this.vx*=r; this.vy*=r; }
                // walls
                if((this.x-this.radius <=0 || this.x+this.radius>=canvas.width) && now-this.lastCollision>this.collisionCD){
                    if(this.x-this.radius<=0) this.x = this.radius+1; else this.x = canvas.width-this.radius-1;
                    this.vx = -this.vx; score++; scoreElement.textContent = score; playBounceSound('wall');
                    this.lastCollision = now;
                }
                // top
                if(this.y-this.radius <=0 && now-this.lastCollision>this.collisionCD){
                    this.y = this.radius+1; this.vy = -this.vy;
                    let centerX = canvas.width/2, push = (centerX-this.x)*0.6/canvas.width;
                    this.vx += push; if(Math.abs(this.vx)<0.4) this.vx = this.vx<0 ? -0.4 : 0.4;
                    score++; scoreElement.textContent = score; playBounceSound('top');
                    this.lastCollision = now;
                }
                // paddle
                if(this.y+this.radius >= paddle.y && this.y-this.radius <= paddle.y+paddle.height &&
                   this.x+this.radius >= paddle.x && this.x-this.radius <= paddle.x+paddle.width && now-this.lastCollision>this.collisionCD){
                    this.y = paddle.y - this.radius - 1;
                    let hitPos = (this.x - (paddle.x + paddle.width/2)) / (paddle.width/2);
                    this.vy = -Math.abs(this.vy); this.vx = hitPos * 2.5;
                    if(Math.abs(this.vx)<0.8) this.vx = this.vx<0 ? -0.8 : 0.8;
                    score++; scoreElement.textContent = score; playBounceSound('paddle');
                    this.lastCollision = now;
                }
                // circles collision
                for(let i=0; i<circles.length; i++){
                    let c = circles[i];
                    let dx = this.x - c.x, dy = this.y - c.y, dist = Math.hypot(dx,dy);
                    if(dist < this.radius + c.radius){
                        let angle = Math.atan2(dy,dx);
                        let speed = Math.hypot(this.vx, this.vy);
                        this.vx = speed * Math.cos(angle); this.vy = speed * Math.sin(angle);
                        let overlap = this.radius + c.radius - dist;
                        this.x += overlap * Math.cos(angle); this.y += overlap * Math.sin(angle);
                        c.grow();
                        score += 5; scoreElement.textContent = score; playBounceSound('circle');
                        // special circle logic
                        if(c.isSpecial && c.activeTime <= MULTI_PROJECTILE_DURATION){
                            if(currentLevel===4 && !multiProjectileActive) {
                                multiProjectileActive = true; multiProjectileTimer = Date.now();
                                this.splitIntoTwo(this);
                            }
                            circles.splice(i,1);
                            if(c.isSpecial) { specialCircle=null; specialCircleActive=false; specialCircleRespawnTimer=0; }
                            score+=30; scoreElement.textContent=score;
                            i--; break;
                        }
                        if(c.shouldDisappear()){
                            circles.splice(i,1); score+=20; scoreElement.textContent=score;
                            i--;
                            if(c.isSpecial) specialCircle=null;
                        }
                        this.lastCollision = now;
                        break;
                    }
                }
                // fall off bottom
                if(this.y + this.radius >= canvas.height){
                    this.active = false;
                    if(currentLevel !== 4){
                        lives--; livesElement.textContent = lives;
                        if(lives<=0) endGame();
                        else setControlsMode('angle');
                    }
                }
            }
            splitIntoTwo(original){
                if(projectiles.length >= 8) return;
                let angle = Math.atan2(original.vy, original.vx);
                let angle1 = angle + Math.PI/8, angle2 = angle - Math.PI/8;
                let spd = 3.5;
                let p1 = new Projectile(original.x, original.y, 90 - (angle1*180/Math.PI), true);
                let p2 = new Projectile(original.x, original.y, 90 - (angle2*180/Math.PI), true);
                p1.vx = spd * Math.cos(angle1); p1.vy = spd * Math.sin(angle1);
                p2.vx = spd * Math.cos(angle2); p2.vy = spd * Math.sin(angle2);
                projectiles.push(p1, p2);
                if(soundEnabled){
                    let osc = audioContext.createOscillator(); let gain = audioContext.createGain();
                    osc.connect(gain); gain.connect(audioContext.destination);
                    osc.frequency.value = 523.25*1.5; osc.type='sawtooth'; gain.gain.value=0.15;
                    gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+0.2);
                    osc.start(); osc.stop(audioContext.currentTime+0.2);
                }
            }
            draw(){
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = '#e94560'; ctx.lineWidth=2; ctx.stroke();
            }
        }
        
        // Triple shot: schedule 3 balls in sequence
        function launchTripleShot(angleDeg){
            if(pendingShots > 0 || shotTimer) return; // already launching
            pendingShots = 3;
            function fireOne(){
                if(pendingShots <= 0) { shotTimer = null; return; }
                // create new projectile
                let newProj = new Projectile(paddle.x + paddle.width/2, paddle.y - 5, angleDeg, false);
                if(currentLevel === 4){
                    projectiles.push(newProj);
                } else {
                    // for levels 1-3 we keep single projectile reference but we can still have multiple? we'll manage array
                    projectiles.push(newProj);
                }
                pendingShots--;
                if(pendingShots > 0){
                    shotTimer = setTimeout(fireOne, 120); // 120ms between shots
                } else {
                    shotTimer = null;
                }
            }
            fireOne();
        }
        
        function drawPaddle(){
            ctx.fillStyle = paddle.color; ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.strokeStyle='#fff'; ctx.strokeRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }
        function updatePaddle(){
            if(keys.left && paddle.x>0) paddle.x -= paddle.speed;
            if(keys.right && paddle.x+paddle.width<canvas.width) paddle.x += paddle.speed;
        }
        
        function drawTrajectory(angle){
            if(projectiles.some(p => p.active) || !gameActive) return;
            let startX = paddle.x + paddle.width/2, startY = paddle.y-5;
            let rad = (180-angle)*Math.PI/180;
            let speed = projectileSpeeds[currentLevel]||4.0;
            let vx = speed*Math.cos(rad), vy = -speed*Math.sin(rad);
            let x=startX, y=startY;
            ctx.beginPath(); ctx.moveTo(x,y);
            for(let i=0;i<30;i++){
                x+=vx*6; y+=vy*6;
                if(x-5<=0||x+5>=canvas.width) vx=-vx;
                if(y-5<=0) { vy=-vy; let push=(canvas.width/2-x)*0.08; vx+=push; }
                if(y+5>=canvas.height) break;
                ctx.lineTo(x,y);
            }
            ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=5; ctx.stroke();
            ctx.beginPath(); ctx.arc(startX, startY, 6, 0, Math.PI*2);
            ctx.fillStyle='#e94560'; ctx.fill();
        }
        
        function setControlsMode(mode){
            if(currentLevel===4 && mode==='angle' && projectiles.some(p=>p.active)) return;
            controlsMode = mode;
            if(mode==='angle'){
                angleSlider.min=0; angleSlider.max=180; angleSlider.value=currentAngle;
                angleValue.textContent = `${currentAngle}°`;
                fireBtn.textContent = 'GO!'; fireBtn.disabled = false;
            } else {
                angleSlider.min=0; angleSlider.max=canvas.width-paddle.width; angleSlider.value=paddle.x;
                angleValue.textContent = 'Move'; fireBtn.textContent = 'WAITING'; fireBtn.disabled = true;
            }
        }
        
        function initCirclesForLevel(){
            circles = []; specialCircle=null; specialCircleActive=false; specialCircleRespawnTimer=0;
            let count = 4 + Math.floor(currentLevel/2);
            if(currentLevel===4) count=5;
            for(let i=0;i<count-(currentLevel===4?1:0);i++){
                let attempts=0, placed=false;
                while(!placed && attempts<60){
                    let diam = Math.floor(Math.random()*25)+30;
                    let x = Math.random()*(canvas.width-diam*2)+diam;
                    let y = Math.random()*(canvas.height*0.35)+50;
                    let newC = new Circle(x,y,diam,currentLevel,false);
                    if(isValidPosition(newC,circles)){ circles.push(newC); placed=true; }
                    attempts++;
                }
                if(!placed){ let diam=30; let x=50+(i*70)%(canvas.width-80); let y=60+(i%3)*40;
                    circles.push(new Circle(x,y,diam,currentLevel,false)); }
            }
            if(currentLevel===4){
                setTimeout(()=>createSpecialCircle(), 1000);
                projectiles = [];
                multiProjectileActive=false;
            }
        }
        
        function createSpecialCircle(){
            if(currentLevel!==4 || !gameActive || allCirclesCleared) return;
            let diam=40;
            for(let att=0;att<40;att++){
                let x = Math.random()*(canvas.width-diam*2)+diam;
                let y = Math.random()*(canvas.height*0.3)+60;
                let sp = new Circle(x,y,diam,currentLevel,true);
                if(isValidPosition(sp,circles)){
                    circles.push(sp); specialCircle=sp; specialCircleActive=true; specialCircleRespawnTimer=0;
                    if(soundEnabled){
                        let osc=audioContext.createOscillator(), gain=audioContext.createGain();
                        osc.connect(gain); gain.connect(audioContext.destination);
                        osc.frequency.value=659.25; osc.type='sine'; gain.gain.value=0.2;
                        gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime+0.3);
                        osc.start(); osc.stop(audioContext.currentTime+0.3);
                    }
                    break;
                }
            }
        }
        
        function checkAllProjectilesGone(){
            if(currentLevel!==4) return false;
            if(projectiles.some(p=>p.active)) return false;
            return true;
        }
        
        function completeLevel(){
            gameActive=false; allCirclesCleared=true;
            if(score>bestScore){ bestScore=score; localStorage.setItem('bestScore',bestScore); bestElement.textContent=bestScore; }
            launchConfetti();
            if(currentLevel===maxLevels){
                levelCompleteElement.innerHTML = `<h2>🎉 Congratulations! 🎉</h2><p>All levels done!</p><p>Final score: <strong>${score}</strong></p><button class="next-level-btn" id="playAgainBtn">PLAY AGAIN</button>`;
                levelCompleteElement.style.display='block';
                document.getElementById('playAgainBtn').addEventListener('click',()=>{ currentLevel=1; initGame(1); });
            } else {
                completedLevelElement.textContent=currentLevel; levelScoreElement.textContent=score;
                levelCompleteElement.style.display='block';
            }
        }
        
        function endGame(){
            gameActive=false;
            if(score>bestScore){ bestScore=score; localStorage.setItem('bestScore',bestScore); bestElement.textContent=bestScore; }
            finalScoreElement.textContent=score; finalBestElement.textContent=bestScore;
            gameOverElement.style.display='block';
        }
        
        function launchConfetti(){
            for(let i=0;i<120;i++){
                let conf = document.createElement('div');
                conf.style.cssText = `position:fixed; width:8px; height:8px; background:${['#e94560','#0fce7c','#ffd166'][Math.floor(Math.random()*3)]}; top:-10px; left:${Math.random()*100}vw; pointer-events:none; z-index:1000; border-radius:2px;`;
                document.body.appendChild(conf);
                conf.animate([{transform:'translateY(0) rotate(0deg)'},{transform:`translateY(${window.innerHeight+100}px) rotate(${Math.random()*360}deg)`}],{duration:2000+Math.random()*1500, easing:'cubic-bezier(0.2,0.9,0.4,1)'}).onfinish=()=>conf.remove();
            }
        }
        
        function applyLevelTheme(){
            let theme=levelThemes[currentLevel]; document.body.style.background=`linear-gradient(135deg, ${theme[0]}, ${theme[1]})`;
            levelElement.textContent=currentLevel; levelIndicator.textContent=`Level ${currentLevel}: ${levelNames[currentLevel]}`;
            paddle.width=paddleSizes[currentLevel]; paddle.x=(canvas.width-paddle.width)/2;
        }
        
        let keys = { left:false, right:false };
        function initGame(level=1){
            currentLevel=level; circles=[]; projectiles=[]; lives=10; score=0; gameActive=true; allCirclesCleared=false;
            specialCircle=null; specialCircleActive=false; multiProjectileActive=false;
            livesElement.textContent=lives; scoreElement.textContent=score;
            applyLevelTheme(); initCirclesForLevel();
            gameOverElement.style.display='none'; levelCompleteElement.style.display='none';
            setControlsMode('angle');
            if(animationId) cancelAnimationFrame(animationId);
            lastTimestamp=0; animate();
        }
        
        let lastTimestamp=0;
        function animate(now=0){
            if(!gameActive) return;
            let delta = Math.min(100, now-lastTimestamp);
            lastTimestamp=now;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            if((!projectiles.some(p=>p.active) || projectiles.length===0) && controlsMode==='angle' && !allCirclesCleared) drawTrajectory(currentAngle);
            for(let c of circles){ c.update(delta); c.draw(); }
            updatePaddle(); drawPaddle();
            // update all projectiles
            for(let i=0;i<projectiles.length;i++){
                let p=projectiles[i];
                if(p.active){ p.update(); p.draw(); if(!p.active) { projectiles.splice(i,1); i--; } }
                else { projectiles.splice(i,1); i--; }
            }
            if(currentLevel===4){
                if(projectiles.some(p=>p.active) && !allCirclesCleared){
                    controlsMode='paddle'; angleSlider.min=0; angleSlider.max=canvas.width-paddle.width; angleSlider.value=paddle.x;
                    angleValue.textContent='Move'; fireBtn.disabled=true; fireBtn.textContent='WAITING';
                } else if(!projectiles.some(p=>p.active) && !allCirclesCleared){
                    if(checkAllProjectilesGone() && !allCirclesCleared && gameActive){
                        lives--; livesElement.textContent=lives;
                        projectiles=[];
                        setControlsMode('angle');
                        if(lives<=0) endGame();
                    }
                }
                // special respawn
                if(!specialCircleActive && specialCircleRespawnTimer<SPECIAL_CIRCLE_RESPAWN_TIME && !allCirclesCleared){
                    specialCircleRespawnTimer+=delta;
                    if(specialCircleRespawnTimer>=SPECIAL_CIRCLE_RESPAWN_TIME) createSpecialCircle();
                }
                if(specialCircle && specialCircle.activeTime<=MULTI_PROJECTILE_DURATION){
                    let left = (MULTI_PROJECTILE_DURATION - specialCircle.activeTime)/1000;
                    ctx.fillStyle='white'; ctx.font='bold 12px Arial'; ctx.fillText(`×2: ${Math.ceil(left)}s`, canvas.width/2, 28);
                }
            } else {
                // normal levels: if no active projectile, switch to angle mode
                if(!projectiles.some(p=>p.active) && controlsMode==='paddle' && !allCirclesCleared){
                    setControlsMode('angle');
                }
            }
            if(circles.length===0 && !allCirclesCleared && gameActive){ allCirclesCleared=true; completeLevel(); }
            animationId = requestAnimationFrame(animate);
        }
        
        // Event binding
        soundToggle.addEventListener('click', toggleSound);
        continueBtn.addEventListener('click',()=>{ if(!allCirclesCleared){ lives+=2; livesElement.textContent=lives; gameOverElement.style.display='none'; gameActive=true; setControlsMode('angle'); animate(); } });
        nextLevelBtn.addEventListener('click',()=>{ levelCompleteElement.style.display='none'; if(currentLevel<maxLevels) currentLevel++; else currentLevel=1; initGame(currentLevel); });
        menuBtn.addEventListener('click',()=>{ levelCompleteElement.style.display='none'; currentLevel=1; initGame(1); });
        restartBtn.addEventListener('click',()=>{ currentLevel=1; initGame(1); });
        skipBtn.addEventListener('click',()=>{ if(gameActive && !allCirclesCleared){ allCirclesCleared=true; completeLevel(); } });
        window.addEventListener('keydown',(e)=>{ if(e.key==='ArrowLeft') keys.left=true; if(e.key==='ArrowRight') keys.right=true; });
        window.addEventListener('keyup',(e)=>{ if(e.key==='ArrowLeft') keys.left=false; if(e.key==='ArrowRight') keys.right=false; });
        angleSlider.addEventListener('input',()=>{
            if(controlsMode==='angle'){ currentAngle=parseInt(angleSlider.value); angleValue.textContent=`${currentAngle}°`; }
            else if(controlsMode==='paddle'){ paddle.x=parseInt(angleSlider.value); }
        });
        fireBtn.addEventListener('click',()=>{
            if(controlsMode==='angle' && gameActive && !allCirclesCleared && !projectiles.some(p=>p.active)){
                // TRIPLE SHOT: launch 3 balls consecutively
                launchTripleShot(currentAngle);
                setControlsMode('paddle');
            }
        });
        canvas.addEventListener('touchmove',(e)=>{ e.preventDefault(); let rect=canvas.getBoundingClientRect(); let tx=e.touches[0].clientX-rect.left; paddle.x=tx-paddle.width/2; paddle.x=Math.min(Math.max(0,paddle.x),canvas.width-paddle.width); angleSlider.value=paddle.x; });
        window.addEventListener('load',()=>{ resizeCanvas(); initGame(1); document.body.addEventListener('click',()=>{ if(audioContext.state==='suspended') audioContext.resume(); },{once:true}); });
        window.addEventListener('resize',resizeCanvas);
    })();
</script>
</body>
</html>
