<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Game - Levels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-top: 10px;
            position: relative;
        }
        
        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-size: 14px;
            flex-wrap: wrap;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .sound-toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            order: 5;
        }
        
        .info-label {
            font-size: 0.7rem;
            color: #a9a9a9;
            margin-bottom: 3px;
        }
        
        .info-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }
        
        .lives {
            color: #e94560;
        }
        
        .score {
            color: #0fce7c;
        }
        
        .best {
            color: #ffd166;
        }
        
        .level {
            color: #9b5de5;
        }
        
        .game-area {
            position: relative;
            margin-bottom: 80px;
        }
        
        canvas {
            background-color: #000;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            display: block;
            margin: 0 auto;
            touch-action: none;
            width: 100%;
            max-width: 400px;
            height: 450px;
        }
        
        .controls {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        .angle-control {
            width: 100%;
            margin-bottom: 12px;
        }
        
        .angle-label {
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #a9a9a9;
        }
        
        .angle-slider {
            width: 100%;
            height: 25px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            outline: none;
        }
        
        .angle-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.7);
        }
        
        .fire-btn {
            background: linear-gradient(to right, #0fce7c, #4cd9a1);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(15, 206, 124, 0.4);
            margin-bottom: 12px;
            width: 100%;
            max-width: 200px;
            margin-top: 20px;
        }
        
        .fire-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(15, 206, 124, 0.6);
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
            display: none;
            z-index: 10;
            width: 80%;
            max-width: 350px;
        }
        
        .game-over h2 {
            color: #e94560;
            font-size: 1.7rem;
            margin-bottom: 12px;
        }
        
        .game-over p {
            margin-bottom: 18px;
            font-size: 1.1rem;
        }
        
        .restart-btn {
            background: linear-gradient(to right, #0fce7c, #4cd9a1);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(15, 206, 124, 0.4);
        }
        
        .restart-btn:active {
            transform: scale(0.95);
        }
        
        .game-over-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .continue-btn {
            background: linear-gradient(to right, #ffd166, #ffed99);
            color: #333;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 209, 102, 0.4);
        }

        .continue-btn:active {
            transform: scale(0.95);
        }
        
        .level-complete {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 40px rgba(15, 206, 124, 0.7);
            display: none;
            z-index: 20;
            width: 85%;
            max-width: 380px;
            border: 3px solid #0fce7c;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 40px rgba(15, 206, 124, 0.7); }
            50% { box-shadow: 0 0 60px rgba(15, 206, 124, 0.9); }
            100% { box-shadow: 0 0 40px rgba(15, 206, 124, 0.7); }
        }
        
        .level-complete h2 {
            color: #0fce7c;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        
        .level-complete p {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .next-level-btn {
            background: linear-gradient(to right, #9b5de5, #c77dff);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(155, 93, 229, 0.4);
            margin-top: 10px;
            width: 100%;
        }
        
        .next-level-btn:active {
            transform: scale(0.95);
        }
        
        @media (max-width: 500px) {
            .game-info {
                flex-direction: row;
                gap: 5px;
                font-size: 12px;
            }
            
            .info-item {
                flex-direction: column;
                width: auto;
            }
            
            .info-label {
                font-size: 0.65rem;
            }
            
            .info-value {
                font-size: 1rem;
            }
            
            canvas {
                height: 350px;
            }
            
            .level-complete {
                padding: 20px;
                width: 90%;
            }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 15;
        }
        
        .sound-toggle {
            background: rgba(0, 0, 0, 0.3);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            flex-shrink: 0;
            order: 5;
        }
        
        .level-indicator {
            margin-top: 5px;
            font-size: 1rem;
            color: #9b5de5;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .debug-buttons {
            position: fixed;
            bottom: 10px;
            left: 10px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .debug-btn {
            background: rgba(155, 93, 229, 0.8);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="level-indicator" id="levelIndicator">Level 1: Classic</div>
        
        <div class="game-info">
            <div class="info-item">
                <span class="info-label">LIVES</span>
                <span class="info-value lives" id="lives">10</span>
            </div>
            <div class="info-item">
                <span class="info-label">SCORE</span>
                <span class="info-value score" id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">BEST</span>
                <span class="info-value best" id="best">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">LEVEL</span>
                <span class="info-value level" id="level">1</span>
            </div>
            <div class="sound-toggle-container">
                <button class="sound-toggle" id="soundToggle">🔊</button>
            </div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="450"></canvas>
        </div>
        
        <div class="controls">
            <div class="angle-control">
                <div class="angle-label"><span id="angleValue">45°</span></div>
                <input type="range" min="0" max="180" value="135" class="angle-slider" id="angleSlider">
            </div>
            <button class="fire-btn" id="fireBtn">GO!</button>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Your score: <span id="finalScore">0</span></p>
        <p>Best score: <span id="finalBest">0</span></p>
        <div class="game-over-buttons">
            <button class="restart-btn" id="restartBtn">PLAY AGAIN</button>
            <button class="continue-btn" id="continueBtn">CONTINUE (+2 LIVES)</button>
        </div>
    </div>
    
    <div class="level-complete" id="levelComplete">
        <h2>Level Complete!</h2>
        <p>Level <span id="completedLevel">1</span> Completed</p>
        <p>Score: <span id="levelScore">0</span></p>
        <p>Lives remaining: <span id="remainingLives">10</span></p>
        <button class="next-level-btn" id="nextLevelBtn">NEXT LEVEL</button>
        <button class="restart-btn" style="margin-top: 10px;" id="menuBtn">LEVEL SELECT</button>
    </div>
    
    <div class="debug-buttons">
        <button class="debug-btn" onclick="skipLevel()">Skip Level</button>
    </div>

<script>
    // Get DOM elements
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const angleSlider = document.getElementById('angleSlider');
    const angleLabel = document.querySelector('.angle-label');
    const angleValue = document.getElementById('angleValue');
    const fireBtn = document.getElementById('fireBtn');
    const livesElement = document.getElementById('lives');
    const scoreElement = document.getElementById('score');
    const bestElement = document.getElementById('best');
    const levelElement = document.getElementById('level');
    const levelIndicator = document.getElementById('levelIndicator');
    const gameOverElement = document.getElementById('gameOver');
    const finalScoreElement = document.getElementById('finalScore');
    const finalBestElement = document.getElementById('finalBest');
    const restartBtn = document.getElementById('restartBtn');
    const continueBtn = document.getElementById('continueBtn');
    const soundToggle = document.getElementById('soundToggle');
    const levelCompleteElement = document.getElementById('levelComplete');
    const completedLevelElement = document.getElementById('completedLevel');
    const levelScoreElement = document.getElementById('levelScore');
    const remainingLivesElement = document.getElementById('remainingLives');
    const nextLevelBtn = document.getElementById('nextLevelBtn');
    const menuBtn = document.getElementById('menuBtn');

    // Game variables
    let circles = [];
    let projectile = null;
    let lives = 10;
    let score = 0;
    let bestScore = localStorage.getItem('bestScore') || 0;
    let gameActive = true;
    let animationId = null;
    let currentAngle = 135;
    let controlsMode = 'angle';
    let allCirclesCleared = false;
    let soundEnabled = true;
    
    // ─── TRIPLE BALL SYSTEM ───────────────────────────────────────────────────
    // All projectiles (the main 3-ball volley + any split children)
    let projectiles = [];
    // Timers for the 2nd and 3rd balls of the triple volley
    let volleyPending = [];   // [{angle, delay}]  remaining balls to fire
    let volleyStartTime = 0;
    
    // Variables para nivel 4
    let specialCircle = null;
    let multiProjectileActive = false;
    let multiProjectileTimer = 0;
    let colorChangeTimer = 0;
    const MULTI_PROJECTILE_DURATION = 15000;
    const COLOR_CHANGE_INTERVAL = 500;
    const SPECIAL_CIRCLE_RESPAWN_TIME = 8000;
    let specialCircleRespawnTimer = 0;
    let specialCircleActive = false;

    // Expiration check
    const expirationDate = new Date('2026-6-1');
    const currentDate = new Date();

    if (currentDate > expirationDate) {
        const trialExpired = document.createElement('div');
        trialExpired.style.cssText = `
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: #e94560;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000;
            font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px;
        `;
        trialExpired.innerHTML = `
            <h2 style="font-size:2.5rem;margin-bottom:20px;color:#e94560;">⏰ Periodo de Prueba Vencido</h2>
            <p style="font-size:1.2rem;margin-bottom:30px;color:#fff;">
                Esta versión de prueba ha expirado.<br>
                Fecha límite: ${expirationDate.toLocaleDateString()}
            </p>
            <p style="font-size:1rem;color:#ffd166;">Contacta al desarrollador para obtener la versión completa.</p>
        `;
        document.body.appendChild(trialExpired);
        gameActive = false;
        if (animationId) cancelAnimationFrame(animationId);
        [fireBtn, angleSlider, restartBtn, continueBtn, nextLevelBtn, menuBtn, soundToggle].forEach(el => {
            if (el) { el.disabled = true; el.style.opacity = '0.5'; el.style.cursor = 'not-allowed'; }
        });
        canvas.style.opacity = '0.3';
        canvas.style.pointerEvents = 'none';
    }
    
    let currentLevel = 1;
    const maxLevels = 4;
    
    const levelThemes = {
        1: ['#1a1a2e', '#16213e'],
        2: ['#2d1b3d', '#4a235a'],
        3: ['#1b3d2d', '#235a4a'],
        4: ['#5d1b3d', '#8a235a']
    };
    
    const levelNames = {
        1: "Classic",
        2: "Moving Circles",
        3: "Small Paddle",
        4: "Multi-Projectile"
    };
    
    let paddle = {
        width: 50,
        height: 10,
        x: 175,
        y: canvas.height - 10,
        speed: 5,
        color: '#ffffff'
    };
    
    const paddleSizes = { 1: 50, 2: 50, 3: 35, 4: 50 };
    const projectileSpeeds = { 1: 4.0, 2: 4.2, 3: 4.5, 4: 3.8 };
    
    let keys = { left: false, right: false };

    bestElement.textContent = bestScore;
    levelElement.textContent = currentLevel;
    levelIndicator.textContent = `Level ${currentLevel}: ${levelNames[currentLevel]}`;

    const musicalNotes = { 'G4': 392.00, 'A4': 440.00, 'B4': 493.88, 'C5': 523.25 };
    const bounceNotes = [musicalNotes['G4'], musicalNotes['A4'], musicalNotes['B4'], musicalNotes['C5']];
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const PADDLE_FREQUENCY = 440.00;
    
    function playBounceSound(type = 'wall') {
        if (!soundEnabled) return;
        try {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            if (type === 'paddle') {
                oscillator.frequency.value = PADDLE_FREQUENCY;
                oscillator.type = 'square';
                gainNode.gain.value = 0.12;
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.12);
                oscillator.start(); oscillator.stop(audioContext.currentTime + 0.12);
            } else {
                const noteIndex = Math.floor(Math.random() * bounceNotes.length);
                const frequency = bounceNotes[noteIndex] + (Math.random() * 20 - 10);
                if (type === 'wall') {
                    oscillator.frequency.value = frequency; oscillator.type = 'sine';
                    gainNode.gain.value = 0.15;
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.08);
                    oscillator.start(); oscillator.stop(audioContext.currentTime + 0.08);
                } else if (type === 'top') {
                    oscillator.frequency.value = frequency * 1.05; oscillator.type = 'sine';
                    gainNode.gain.value = 0.14;
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.09);
                    oscillator.start(); oscillator.stop(audioContext.currentTime + 0.09);
                } else if (type === 'circle') {
                    oscillator.frequency.value = frequency * 0.85; oscillator.type = 'triangle';
                    gainNode.gain.value = 0.16;
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.1);
                    oscillator.start(); oscillator.stop(audioContext.currentTime + 0.1);
                }
            }
        } catch (e) { console.log("Audio not available:", e); }
    }
    
    function toggleSound() {
        soundEnabled = !soundEnabled;
        soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
        localStorage.setItem('soundEnabled', soundEnabled);
    }
    
    const savedSoundSetting = localStorage.getItem('soundEnabled');
    if (savedSoundSetting !== null) {
        soundEnabled = savedSoundSetting === 'true';
        soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
    }

    function resizeCanvas() {
        const containerWidth = canvas.parentElement.clientWidth;
        const maxWidth = Math.min(400, containerWidth);
        canvas.width = maxWidth;
        canvas.height = 450;
        paddle.width = paddleSizes[currentLevel] || 50;
        paddle.x = (canvas.width - paddle.width) / 2;
        paddle.y = canvas.height - 10;
    }

    function circlesOverlap(c1, c2) {
        const dx = c1.x - c2.x, dy = c1.y - c2.y;
        return Math.sqrt(dx*dx + dy*dy) < (c1.radius + c2.radius + 10);
    }

    function isValidPosition(newCircle, existingCircles) {
        for (let c of existingCircles) { if (circlesOverlap(newCircle, c)) return false; }
        return true;
    }

    // Circle class
    class Circle {
        constructor(x, y, diameter, level = 1, isSpecial = false) {
            this.x = x; this.y = y;
            this.diameter = diameter; this.radius = diameter / 2;
            this.color = this.getRandomColor();
            this.level = level; this.isSpecial = isSpecial; this.activeTime = 0;
            if (level >= 2) {
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.0;
                this.maxSpeed = 1.2 + (level * 0.2);
            } else { this.speedX = 0; this.speedY = 0; }
            this.minX = this.radius; this.maxX = canvas.width - this.radius;
            this.minY = this.radius + 20; this.maxY = canvas.height * 0.6;
        }
        getRandomColor() {
            if (this.isSpecial) {
                const sc = ['#ffff00','#ffdd00','#ffaa00','#00ffff','#ff00ff','#ffff80'];
                return sc[Math.floor(Math.random() * sc.length)];
            }
            const colors = ['#e94560','#ff6b6b','#ff9e7d','#0fce7c','#4cd9a1','#1dd1a1',
                '#ffd166','#ffed99','#f9c74f','#118ab2','#06d6a0','#4cc9f0',
                '#9b5de5','#c77dff','#7209b7','#f15bb5','#ff70a6','#ff477e'];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        update(deltaTime) {
            if (this.isSpecial) {
                this.activeTime += deltaTime;
                if (this.activeTime <= MULTI_PROJECTILE_DURATION) {
                    if (Math.floor(this.activeTime / COLOR_CHANGE_INTERVAL) !==
                        Math.floor((this.activeTime - deltaTime) / COLOR_CHANGE_INTERVAL)) {
                        this.color = this.getRandomColor();
                    }
                } else { this.color = '#ffff00'; }
            }
            if (this.level >= 2) {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x <= this.minX || this.x >= this.maxX) {
                    this.speedX = -this.speedX;
                    this.x = this.x <= this.minX ? this.minX + 1 : this.maxX - 1;
                }
                if (this.y <= this.minY || this.y >= this.maxY) {
                    this.speedY = -this.speedY;
                    this.y = this.y <= this.minY ? this.minY + 1 : this.maxY - 1;
                }
                const speed = Math.sqrt(this.speedX*this.speedX + this.speedY*this.speedY);
                if (speed > this.maxSpeed) {
                    this.speedX = (this.speedX/speed)*this.maxSpeed;
                    this.speedY = (this.speedY/speed)*this.maxSpeed;
                }
            }
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            if (this.isSpecial) {
                ctx.shadowColor = this.color;
                ctx.shadowBlur = this.activeTime <= MULTI_PROJECTILE_DURATION ? 20 : 10;
                ctx.fillStyle = this.color;
            } else {
                ctx.fillStyle = this.color; ctx.shadowBlur = 0;
            }
            ctx.fill(); ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            if (this.isSpecial) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2;
                ctx.setLineDash([5,3]); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('×2', this.x, this.y);
                if (this.activeTime <= MULTI_PROJECTILE_DURATION) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 12, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
                }
            } else if (this.level >= 2) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 3, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
            }
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.max(10, this.radius / 2)}px Arial`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(this.diameter.toString(), this.x, this.y);
        }
        grow() {
            const growth = Math.floor(Math.random() * 3) + 3;
            this.diameter += growth; this.radius = this.diameter / 2;
            this.minX = this.radius; this.maxX = canvas.width - this.radius;
            this.minY = this.radius + 20; this.maxY = canvas.height * 0.5;
        }
        shouldDisappear() { return this.diameter >= 300; }
    }

    // ─── Projectile class ────────────────────────────────────────────────────
    class Projectile {
        constructor(x, y, angle, isChild = false) {
            this.x = x; this.y = y;
            this.radius = 7;
            this.speed = isChild ? 3.5 : projectileSpeeds[currentLevel] || 4.0;
            this.angle = (180 - angle) * Math.PI / 180;
            this.vx = this.speed * Math.cos(this.angle);
            this.vy = -this.speed * Math.sin(this.angle);
            this.active = true;
            this.isChild = isChild;
            this.color = isChild ? '#ffaa00' : '#ffffff';
            this.lastWallCollisionTime = 0;
            this.lastTopCollisionTime = 0;
            this.lastPaddleCollisionTime = 0;
            this.minCollisionInterval = 100;
            this.collisionCooldown = 50;
            this.lastAnyCollisionTime = 0;
        }
        
        update() {
            const currentTime = Date.now();
            this.x += this.vx; this.y += this.vy;
            const minSpeed = this.isChild ? 2.5 : 3.0;
            const maxSpeed = this.isChild ? 4.5 : 5.5;
            const currentSpeed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
            if (currentSpeed < minSpeed && currentSpeed > 0) {
                const r = minSpeed / currentSpeed; this.vx *= r; this.vy *= r;
            }
            if (currentSpeed > maxSpeed) {
                const r = maxSpeed / currentSpeed; this.vx *= r; this.vy *= r;
            }
            // Wall
            if ((this.x - this.radius <= 0 || this.x + this.radius >= canvas.width) &&
                currentTime - this.lastWallCollisionTime > this.minCollisionInterval &&
                currentTime - this.lastAnyCollisionTime > this.collisionCooldown) {
                this.x = this.x - this.radius <= 0 ? this.radius + 1 : canvas.width - this.radius - 1;
                this.vx = -this.vx;
                this.vy += (Math.random() * 0.3) - 0.15;
                score++; scoreElement.textContent = score;
                playBounceSound('wall');
                this.lastWallCollisionTime = currentTime; this.lastAnyCollisionTime = currentTime;
            }
            // Ceiling
            if (this.y - this.radius <= 0 &&
                currentTime - this.lastTopCollisionTime > this.minCollisionInterval &&
                currentTime - this.lastAnyCollisionTime > this.collisionCooldown) {
                this.y = this.radius + 1; this.vy = -this.vy;
                const centerX = canvas.width / 2;
                const pushForce = ((centerX - this.x) / (canvas.width / 2)) * 0.6 * (Math.abs(centerX - this.x) / (canvas.width / 2));
                this.vx += pushForce;
                if (Math.abs(this.vx) < 0.4) this.vx = this.vx < 0 ? -0.4 : 0.4;
                if (Math.abs(this.vx) > 3.5) this.vx = this.vx > 0 ? 3.5 : -3.5;
                score++; scoreElement.textContent = score;
                playBounceSound('top');
                this.lastTopCollisionTime = currentTime; this.lastAnyCollisionTime = currentTime;
            }
            // Paddle
            if (this.y + this.radius >= paddle.y &&
                this.y - this.radius <= paddle.y + paddle.height &&
                this.x + this.radius >= paddle.x &&
                this.x - this.radius <= paddle.x + paddle.width &&
                currentTime - this.lastPaddleCollisionTime > this.minCollisionInterval &&
                currentTime - this.lastAnyCollisionTime > this.collisionCooldown) {
                this.y = paddle.y - this.radius - 1;
                const hitPos = (this.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
                this.vy = -Math.abs(this.vy); this.vx = hitPos * 2.5;
                if (Math.abs(this.vx) < 0.8) this.vx = this.vx < 0 ? -0.8 : 0.8;
                const spd2 = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
                if (spd2 < minSpeed) { const r = minSpeed/spd2; this.vx*=r; this.vy*=r; }
                if (spd2 > maxSpeed) { const r = maxSpeed/spd2; this.vx*=r; this.vy*=r; }
                score++; scoreElement.textContent = score;
                playBounceSound('paddle');
                this.lastPaddleCollisionTime = currentTime; this.lastAnyCollisionTime = currentTime;
            }
            // Circles
            for (let i = 0; i < circles.length; i++) {
                const circle = circles[i];
                const dx = this.x - circle.x, dy = this.y - circle.y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < this.radius + circle.radius) {
                    const angle = Math.atan2(dy, dx);
                    const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
                    this.vx = speed * Math.cos(angle);
                    this.vy = speed * Math.sin(angle);
                    const overlap = this.radius + circle.radius - distance;
                    this.x += overlap * Math.cos(angle); this.y += overlap * Math.sin(angle);
                    circle.grow();
                    score += 5; scoreElement.textContent = score;
                    playBounceSound('circle');
                    // Special circle logic (level 4)
                    if (circle.isSpecial && circle.activeTime <= MULTI_PROJECTILE_DURATION) {
                        if (!multiProjectileActive) {
                            multiProjectileActive = true; multiProjectileTimer = Date.now();
                        }
                        splitProjectile(this);
                        circles.splice(i, 1);
                        specialCircle = null; specialCircleActive = false; specialCircleRespawnTimer = 0;
                        score += 30; scoreElement.textContent = score; i--; break;
                    }
                    if (circle.y < canvas.height * 0.3) {
                        const pushToCenter = (canvas.width/2 - this.x) * 0.1 / canvas.width;
                        this.vx += pushToCenter;
                    }
                    if (circle.shouldDisappear()) {
                        circles.splice(i, 1);
                        score += 20; scoreElement.textContent = score; i--;
                        if (circle.isSpecial) specialCircle = null;
                    }
                    const spd3 = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
                    if (spd3 > maxSpeed) { const r = maxSpeed/spd3; this.vx*=r; this.vy*=r; }
                    this.lastAnyCollisionTime = currentTime; break;
                }
            }
            if (Math.abs(this.vx) < 0.3 && Math.abs(this.vy) > 2) {
                this.vx += (Math.random() - 0.5) * 1.0;
            }
            // Fell off bottom
            if (this.y + this.radius >= canvas.height && this.active) {
                this.active = false;
                // Life deduction is handled centrally in checkAllProjectilesGone()
            }
        }
        
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            if (this.isChild) {
                ctx.strokeStyle = '#ff6600'; ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 10;
            } else {
                ctx.strokeStyle = '#e94560'; ctx.shadowBlur = 0;
            }
            ctx.lineWidth = 2; ctx.stroke(); ctx.shadowBlur = 0;
        }
    }

    // ─── Split projectile (level 4 special circle) ───────────────────────────
    function splitProjectile(originalProjectile) {
        if (currentLevel !== 4 || projectiles.length >= 8) return;
        multiProjectileActive = true; multiProjectileTimer = Date.now();
        controlsMode = 'paddle';
        angleSlider.min = 0; angleSlider.max = canvas.width - paddle.width;
        angleSlider.value = paddle.x;
        angleLabel.innerHTML = '<span id="angleValue">Move</span>';
        fireBtn.textContent = 'WAITING'; fireBtn.disabled = true;
        const currentAngleRad = Math.atan2(originalProjectile.vy, originalProjectile.vx);
        const angle1 = currentAngleRad + Math.PI / 8;
        const angle2 = currentAngleRad - Math.PI / 8;
        const speed = 3.5;
        const p1 = new Projectile(originalProjectile.x, originalProjectile.y,
            90 - (angle1 * 180 / Math.PI), true);
        p1.vx = speed * Math.cos(angle1); p1.vy = speed * Math.sin(angle1);
        const p2 = new Projectile(originalProjectile.x, originalProjectile.y,
            90 - (angle2 * 180 / Math.PI), true);
        p2.vx = speed * Math.cos(angle2); p2.vy = speed * Math.sin(angle2);
        projectiles.push(p1, p2);
        if (soundEnabled) {
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain); gain.connect(audioContext.destination);
                osc.frequency.value = 523.25 * 1.5; osc.type = 'sawtooth';
                gain.gain.value = 0.15;
                gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.2);
                osc.start(); osc.stop(audioContext.currentTime + 0.2);
            } catch(e) {}
        }
    }
    
    // ─── Check if all projectiles (including pending volley) have fallen ──────
    function checkAllProjectilesGone() {
        // Still have balls pending in the volley queue → not done yet
        if (volleyPending.length > 0) return false;
        // Any active projectile?
        for (let p of projectiles) { if (p.active) return false; }
        // Were any projectiles ever fired this turn?
        return projectiles.length > 0;
    }

    // ─── Launch a single projectile and push to projectiles[] ────────────────
    function launchOne(angle) {
        const p = new Projectile(
            paddle.x + paddle.width / 2,
            paddle.y - 5,
            angle,
            false
        );
        projectiles.push(p);
    }

    // Draw paddle
    function drawPaddle() {
        ctx.fillStyle = paddle.color;
        ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.strokeRect(paddle.x, paddle.y, paddle.width, paddle.height);
        if (currentLevel === 3) {
            ctx.fillStyle = 'rgba(233,69,96,0.3)';
            ctx.fillRect(paddle.x - 10, paddle.y, 10, paddle.height);
            ctx.fillRect(paddle.x + paddle.width, paddle.y, 10, paddle.height);
        }
    }

    function updatePaddle() {
        if (keys.left && paddle.x > 0) paddle.x -= paddle.speed;
        if (keys.right && paddle.x + paddle.width < canvas.width) paddle.x += paddle.speed;
    }

    function drawTrajectory(angle) {
        if (projectiles.some(p => p.active) || volleyPending.length > 0) return;
        const startX = paddle.x + paddle.width / 2;
        const startY = paddle.y - 5;
        const radius = 5;
        const speed = projectileSpeeds[currentLevel] || 4.0;
        const angleRad = (180 - angle) * Math.PI / 180;
        let x = startX, y = startY;
        let vx = speed * Math.cos(angleRad), vy = -speed * Math.sin(angleRad);
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(x, y);
        for (let i = 0; i < 25; i++) {
            x += vx * 7; y += vy * 7;
            if (x - radius <= 0 || x + radius >= canvas.width) {
                vx = -vx;
                ctx.fillStyle = '#ffd166'; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
            }
            if (y - radius <= 0) {
                vy = -vy; vx += (canvas.width/2 - x) * 0.08;
                ctx.fillStyle = '#ffd166'; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
            }
            if (y + radius >= paddle.y && y - radius <= paddle.y + paddle.height &&
                x + radius >= paddle.x && x - radius <= paddle.x + paddle.width) {
                vy = -Math.abs(vy); vx = ((x - (paddle.x + paddle.width/2)) / (paddle.width/2)) * 2.5;
            }
            if (y + radius >= canvas.height) {
                ctx.lineTo(x, y);
                ctx.fillStyle = '#e94560'; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill(); break;
            }
            ctx.lineTo(x, y);
            if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) break;
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 6; ctx.stroke();
        ctx.setLineDash([8,6]); ctx.beginPath(); ctx.moveTo(startX, startY);
        x = startX; y = startY; vx = speed * Math.cos(angleRad); vy = -speed * Math.sin(angleRad);
        for (let i = 0; i < 25; i++) {
            x += vx * 7; y += vy * 7;
            if (x - radius <= 0 || x + radius >= canvas.width) vx = -vx;
            if (y - radius <= 0) { vy = -vy; vx += (canvas.width/2 - x) * 0.08; }
            if (y + radius >= canvas.height) break;
            ctx.lineTo(x, y);
            if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) break;
        }
        ctx.strokeStyle = 'rgba(255,215,102,0.8)'; ctx.lineWidth = 4; ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = '#e94560'; ctx.beginPath(); ctx.arc(startX, startY, 6, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    }

    function initCirclesForLevel() {
        circles = [];
        specialCircle = null; specialCircleActive = false; specialCircleRespawnTimer = 0;
        const maxAttempts = 100;
        let circleCount = 4 + Math.floor(currentLevel / 2);
        if (currentLevel === 4) {
            circleCount = 5;
            for (let i = 0; i < circleCount - 1; i++) {
                let attempts = 0, validPosition = false, newCircle;
                while (!validPosition && attempts < maxAttempts) {
                    const diameter = Math.floor(Math.random() * 25) + 30;
                    const x = Math.random() * (canvas.width - diameter*2) + diameter;
                    const y = Math.random() * (canvas.height * 0.3) + 60;
                    newCircle = new Circle(x, y, diameter, currentLevel, false);
                    if (isValidPosition(newCircle, circles)) { validPosition = true; circles.push(newCircle); }
                    attempts++;
                }
            }
            setTimeout(() => { createSpecialCircle(); }, 1000);
        } else {
            for (let i = 0; i < circleCount; i++) {
                let attempts = 0, validPosition = false, newCircle;
                while (!validPosition && attempts < maxAttempts) {
                    const diameter = Math.floor(Math.random() * 25) + 30;
                    const x = Math.random() * (canvas.width - diameter*2) + diameter;
                    const y = Math.random() * (canvas.height * 0.4) + 40;
                    newCircle = new Circle(x, y, diameter, currentLevel, false);
                    if (isValidPosition(newCircle, circles)) { validPosition = true; circles.push(newCircle); }
                    attempts++;
                }
                if (!validPosition) {
                    const diameter = 30;
                    const x = (i%2) * (canvas.width/2) + canvas.width/4;
                    const y = Math.floor(i/2) * (canvas.height/4) + canvas.height/6;
                    circles.push(new Circle(x, y, diameter, currentLevel, false));
                }
            }
        }
        multiProjectileActive = false; multiProjectileTimer = 0; colorChangeTimer = 0;
    }

    function setControlsMode(mode) {
        controlsMode = mode;
        if (mode === 'angle') {
            angleSlider.min = 0; angleSlider.max = 180; angleSlider.value = currentAngle;
            angleLabel.innerHTML = `<span id="angleValue">${currentAngle}°</span>`;
            fireBtn.textContent = 'GO!'; fireBtn.disabled = false;
        } else if (mode === 'paddle') {
            angleSlider.min = 0; angleSlider.max = canvas.width - paddle.width;
            angleSlider.value = paddle.x;
            angleLabel.innerHTML = '<span id="angleValue">Move</span>';
            fireBtn.textContent = 'WAITING'; fireBtn.disabled = true;
        }
    }

    function applyLevelTheme() {
        const theme = levelThemes[currentLevel] || levelThemes[1];
        document.body.style.background = `linear-gradient(135deg, ${theme[0]}, ${theme[1]})`;
        levelElement.textContent = currentLevel;
        levelIndicator.textContent = `Level ${currentLevel}: ${levelNames[currentLevel]}`;
        paddle.width = paddleSizes[currentLevel] || 50;
        paddle.x = (canvas.width - paddle.width) / 2;
    }

    function initGame(level = 1) {
        currentLevel = level;
        circles = []; projectile = null;
        lives = 10; score = 0; gameActive = true; allCirclesCleared = false;
        multiProjectileActive = false; multiProjectileTimer = 0;
        // Reset triple-ball state
        projectiles = []; volleyPending = []; volleyStartTime = 0;
        livesElement.textContent = lives; scoreElement.textContent = score;
        applyLevelTheme();
        paddle.width = paddleSizes[currentLevel] || 50;
        paddle.x = (canvas.width - paddle.width) / 2;
        initCirclesForLevel();
        gameOverElement.style.display = 'none'; levelCompleteElement.style.display = 'none';
        setControlsMode('angle');
        if (animationId) cancelAnimationFrame(animationId);
        lastTime = 0; animate();
    }

    function createSpecialCircle() {
        if (currentLevel !== 4 || !gameActive || allCirclesCleared) return;
        const specialDiameter = 40;
        let validPosition = false, attempts = 0;
        while (!validPosition && attempts < 50) {
            const x = Math.random() * (canvas.width - specialDiameter*2) + specialDiameter;
            const y = Math.random() * (canvas.height * 0.3) + 60;
            const newSC = new Circle(x, y, specialDiameter, currentLevel, true);
            if (isValidPosition(newSC, circles)) {
                validPosition = true; circles.push(newSC);
                specialCircle = newSC; specialCircleActive = true; specialCircleRespawnTimer = 0;
                if (soundEnabled) {
                    try {
                        const osc = audioContext.createOscillator(), gain = audioContext.createGain();
                        osc.connect(gain); gain.connect(audioContext.destination);
                        osc.frequency.value = 659.25; osc.type = 'sine';
                        gain.gain.value = 0.2;
                        gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3);
                        osc.start(); osc.stop(audioContext.currentTime + 0.3);
                    } catch(e) {}
                }
            }
            attempts++;
        }
    }

    // ─── Main animation loop ─────────────────────────────────────────────────
    let lastTime = 0;
    function animate(currentTime = 0) {
        if (!gameActive) return;
        const deltaTime = currentTime - lastTime;
        lastTime = currentTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Show trajectory when idle
        const anyActive = projectiles.some(p => p.active) || volleyPending.length > 0;
        if (!anyActive && controlsMode === 'angle' && !allCirclesCleared) {
            drawTrajectory(currentAngle);
        }

        // Update circles
        for (let circle of circles) { circle.update(deltaTime); circle.draw(); }

        updatePaddle(); drawPaddle();

        // ── Spawn pending volley balls ────────────────────────────────────────
        if (volleyPending.length > 0) {
            const now = Date.now();
            while (volleyPending.length > 0 && now - volleyStartTime >= volleyPending[0].delay) {
                const entry = volleyPending.shift();
                launchOne(entry.angle);
            }
        }

        // ── Update & draw all projectiles ────────────────────────────────────
        for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            if (p.active) {
                p.update(); p.draw();
            }
            // Keep inactive ones until we check if all are gone
        }

        // Keep paddle mode while balls are in play
        const stillActive = projectiles.some(p => p.active) || volleyPending.length > 0;
        if (stillActive && !allCirclesCleared) {
            if (controlsMode !== 'paddle') {
                controlsMode = 'paddle';
                angleSlider.min = 0; angleSlider.max = canvas.width - paddle.width;
                angleSlider.value = paddle.x;
                angleLabel.innerHTML = '<span id="angleValue">Move</span>';
                fireBtn.textContent = 'WAITING'; fireBtn.disabled = true;
            }
        }

        // Check if the entire volley is over (all 3 balls fell)
        if (checkAllProjectilesGone() && !allCirclesCleared) {
            lives--;
            livesElement.textContent = lives;
            // Clean up
            projectiles = []; volleyPending = [];
            setControlsMode('angle');
            if (lives <= 0) { endGame(); return; }
        }

        // Level 4 special-circle respawn UI
        if (currentLevel === 4 && gameActive && !allCirclesCleared) {
            if (!specialCircleActive && specialCircleRespawnTimer < SPECIAL_CIRCLE_RESPAWN_TIME) {
                specialCircleRespawnTimer += deltaTime;
                if (specialCircleRespawnTimer > 1000) {
                    const timeLeft = SPECIAL_CIRCLE_RESPAWN_TIME - specialCircleRespawnTimer;
                    const secondsLeft = Math.ceil(timeLeft / 1000);
                    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(`×2 Power reappears in: ${secondsLeft}s`, canvas.width/2, canvas.height-50);
                    const bw = 200, bh = 6, bx = (canvas.width-200)/2, by = canvas.height-35;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(bx,by,bw,bh);
                    ctx.fillStyle = '#9b5de5';
                    ctx.fillRect(bx,by,bw*(specialCircleRespawnTimer/SPECIAL_CIRCLE_RESPAWN_TIME),bh);
                }
            } else if (!specialCircleActive && specialCircleRespawnTimer >= SPECIAL_CIRCLE_RESPAWN_TIME) {
                createSpecialCircle();
            }
            if (specialCircle) specialCircleActive = true;
            if (specialCircle && specialCircle.activeTime <= MULTI_PROJECTILE_DURATION) {
                const tl = MULTI_PROJECTILE_DURATION - specialCircle.activeTime;
                const sl = Math.ceil(tl/1000);
                ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`×2 Power: ${sl}s`, canvas.width/2, 25);
                const bw=200, bh=8, bx=(canvas.width-200)/2, by=35, prog=tl/MULTI_PROJECTILE_DURATION;
                ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(bx,by,bw,bh);
                ctx.fillStyle = prog>0.5?'#0fce7c':prog>0.2?'#ffd166':'#e94560';
                ctx.fillRect(bx,by,bw*prog,bh);
            }
        }

        if (circles.length === 0 && !allCirclesCleared && gameActive) {
            allCirclesCleared = true; completeLevel();
        }

        if (gameActive) animationId = requestAnimationFrame(animate);
    }

    function completeLevel() {
        gameActive = false; specialCircleActive = false; specialCircleRespawnTimer = 0;
        if (score > bestScore) {
            bestScore = score; localStorage.setItem('bestScore', bestScore);
            bestElement.textContent = bestScore;
        }
        launchConfetti();
        if (currentLevel === maxLevels) {
            levelCompleteElement.innerHTML = `
                <h2>🎉 Congratulations! 🎉</h2>
                <p>You've completed all levels!</p>
                <p>Final score: <strong>${score}</strong></p>
                <button class="next-level-btn" id="playAgainBtn">PLAY AGAIN FROM LEVEL 1</button>
            `;
            levelCompleteElement.style.display = 'block';
            setTimeout(() => {
                document.getElementById('playAgainBtn').addEventListener('click', () => { currentLevel = 1; initGame(currentLevel); });
            }, 100);
        } else {
            completedLevelElement.textContent = currentLevel;
            levelScoreElement.textContent = score;
            remainingLivesElement.textContent = lives;
            levelCompleteElement.style.display = 'block';
        }
    }

    function endGame() {
        gameActive = false; specialCircleActive = false; specialCircleRespawnTimer = 0;
        if (score > bestScore) {
            bestScore = score; localStorage.setItem('bestScore', bestScore);
            bestElement.textContent = bestScore;
        }
        finalScoreElement.textContent = score; finalBestElement.textContent = bestScore;
        gameOverElement.style.display = 'block';
    }
    
    function launchConfetti() {
        const colors = ['#e94560','#0fce7c','#ffd166','#118ab2','#9b5de5','#ffffff'];
        for (let i = 0; i < 150; i++) {
            const el = document.createElement('div');
            el.style.cssText = `position:absolute;width:10px;height:10px;
                background:${colors[Math.floor(Math.random()*colors.length)]};
                border-radius:${Math.random()>0.5?'50%':'0'};
                top:-20px;left:${Math.random()*100}vw;opacity:0.8;z-index:15;pointer-events:none`;
            document.body.appendChild(el);
            const anim = el.animate([
                { transform:'translateY(0px) rotate(0deg)', opacity:1 },
                { transform:`translateY(${window.innerHeight+100}px) rotate(${Math.random()*360}deg)`, opacity:0 }
            ], { duration: Math.random()*3000+2000, easing:'cubic-bezier(0.1,0.8,0.3,1)' });
            anim.onfinish = () => el.remove();
        }
    }

    // ─── Event listeners ─────────────────────────────────────────────────────
    soundToggle.addEventListener('click', toggleSound);
    
    continueBtn.addEventListener('click', function() {
        if (!allCirclesCleared) {
            lives = 2; livesElement.textContent = lives;
            gameOverElement.style.display = 'none'; gameActive = true;
            projectiles = []; volleyPending = [];
            setControlsMode('angle'); lastTime = 0; animate();
        }
    });

    nextLevelBtn.addEventListener('click', function() {
        levelCompleteElement.style.display = 'none';
        currentLevel = currentLevel < maxLevels ? currentLevel + 1 : 1;
        initGame(currentLevel);
    });

    menuBtn.addEventListener('click', function() {
        levelCompleteElement.style.display = 'none'; currentLevel = 1; initGame(currentLevel);
    });

    window.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft') keys.left = true;
        if (e.key === 'ArrowRight') keys.right = true;
        if ((e.key === 'n' || e.key === 'N') && gameActive && !allCirclesCleared) {
            e.preventDefault(); allCirclesCleared = true; completeLevel();
        }
    });

    window.addEventListener('keyup', function(e) {
        if (e.key === 'ArrowLeft') keys.left = false;
        if (e.key === 'ArrowRight') keys.right = false;
    });

    canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        const touch = e.touches[0], rect = canvas.getBoundingClientRect();
        paddle.x = touch.clientX - rect.left - paddle.width / 2;
        if (paddle.x < 0) paddle.x = 0;
        if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
    });

    angleSlider.addEventListener('input', function() {
        if (controlsMode === 'angle') {
            currentAngle = parseInt(this.value);
            const av = document.getElementById('angleValue');
            if (av) av.textContent = `${currentAngle}°`;
        } else if (controlsMode === 'paddle') {
            paddle.x = parseInt(this.value);
        }
    });

    // ── Fire button: schedule the triple-ball volley ──────────────────────────
    fireBtn.addEventListener('click', function() {
        if (controlsMode !== 'angle') return;
        const noActive = !projectiles.some(p => p.active) && volleyPending.length === 0;
        if (!noActive) return;

        // Clear any stale inactive projectiles from last turn
        projectiles = [];
        volleyPending = [];

        // Fire 1st ball immediately
        launchOne(currentAngle);

        // Schedule 2nd and 3rd balls at +500 ms and +1000 ms
        volleyPending.push({ angle: currentAngle, delay: 500 });
        volleyPending.push({ angle: currentAngle, delay: 1000 });
        volleyStartTime = Date.now();

        setControlsMode('paddle');
    });

    restartBtn.addEventListener('click', function() { currentLevel = 1; initGame(currentLevel); });

    function skipLevel() {
        if (gameActive && !allCirclesCleared) { allCirclesCleared = true; completeLevel(); }
    }

    window.addEventListener('load', function() {
        resizeCanvas(); initGame(currentLevel); setControlsMode('angle');
        document.body.addEventListener('click', function initAudio() {
            if (audioContext.state === 'suspended') audioContext.resume();
            document.body.removeEventListener('click', initAudio);
        }, { once: true });
    });
    
    window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
